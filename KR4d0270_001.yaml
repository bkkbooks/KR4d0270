  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0270_WYG_001-1a, image: WYG1163/WYG1163-0729c.png}
body:
  text: 放翁詩選前集卷一宋羅椅編古詩蜀酒歌漢州鵝黃鸞鳳雛不鷙不摶德有餘眉州玻璃天馬駒出門已無萬里塗病夫少年夢清都曽腸虛皇碧琳腴文德殿門辰奏書歸局黃封羅百壺十年流落狂不除遍走人間尋酒壚青絲玉瓶到處酤鵝黃玻璃一滴無安得豪士致連車倒瓶不用杯與盂琵琶如雷聒坐隅不愁渴死老相如與青城道人飲酒作君不見太傅晚歲具海舟歸欲極意東山遊翰林偶脫夜郎謫大醉賦詩黃鶴樓兩賢窮達何足道同是逸氣橫清秋我無一事行萬里青山白雲聊散愁有酒不換西涼州無酒不典鷫鸘裘不作王猛傲睨坐捫蝨不作寧戚悲歌起飯牛五雲覆鼎金丹熟笙鶴飄然戲十洲夏夜大醉醒後有感少時酒隱東海濵結交盡是英豪人龍泉三尺動牛斗隂符一編役鬼神客遊山南夜望氣頗謂王師當入秦欲傾天上河漢水淨洗關中沙漠塵那知一旦事大􅍝騎驢劒閣霜毛新却將覆氊草檄手小詩點綴西州春素心雖願老巖壑大義未敢忘君臣雞鳴酒解不成寐起坐肝膽空輪囷雨中登安福寺塔平生喜登高醉眼無疆界北顧極幽并東望跨海岱喟然撫手歎從古幾成敗英雄如過鳥城郭但遺塊今朝上黑塔千里曠無礙忽驚風霆劈坐覺天地晦急雨挾龍腥溽暑為摧壞皇天念蟠鬱令我寄一快那知書生狂自倚心眼大更思駐潼關黃河看如帶怡齋東湖仲夏草樹荒屋古無人亭午涼萱房微呀不見日筍籜自解時吹香野藤蟠屈入窗罅濕菌扶疏生屋梁跨溝數椽最幽翳漲水及檻雨敗墻靜涵青蘋舞藻荇間立白鷺浮鴛鴦芙蕖雖瘦亦瀰漫照眼翠蓋遮紅粧水紋珍簟欲卷却月團素扇懶復將天風忽送塔鈴語喚覺清夢遊瀟湘投梁參政浮生無根株志士惜浪死雞鳴何預人推枕中夜起遊也本無竒折腰百僚底流離鬢成絲悲吒淚如洗殘年走巴峽辛苦為斗米逺衝三伏熱直指九月水回首長安城未忍便萬里袖詩叩東府再拜求望履平生實易足名幸汙黃紙但憂死無聞功不挂青史頗聞胸奴亂天意殄蛇豕何時嫖姚師大刷渭橋耻士各奮所長儒生未宜鄙覆氊草軍書不畏寒墮指遊漢州西湖房公一跌叢衆毁八年漢州為刺史繞城鑿湖一百頃島嶼曲折三四里小庵靜院穿竹入危榭飛樓壓城起空濛煙雨媚松楠顚倒風霜老葭葦日月苦長身苦間萬事不理看湖水向來愛琴雖一癖觀過自足知夫子畫船載酒凌湖光想公樂飲千萬場歎息風流今不泯兩川名醖避鵝黃漢中酒名鵝黃蜀酒皆不能及醉後草書歌詩戲作朱樓矯首隘八荒緑酒一舉纍百觴洗我堆阜峥嶸之胸次寫為淋漓放縱之詞章墨翻初若鬼神怒字瘦忽作蛟螭僵寶刀出匣揮雪刃大舸破浪馳風檣紙窮擲筆霹靂響婦女驚走兒童藏往時草檄喻西域颯颯聲動中書堂一朝放迹忽十載西掠三巴窮夜郎山川荒絶風俗異賴有酒美猶能狂醉中自脫頭上幘緑髮未許侵微霜人生得喪良細事孰謂老大多悲傷追補漢太液黃鵠歌建章宫裏春風寒太液水生池面㝟中人馳奏黃鵠下龍旗豹尾臨池看芹香藻暖鵠得意左右從官呼萬嵗須臾傳詔宴公卿歡聲如雷動天地時平宫省樂遊多黃鵠刷羽涵恩波小臣珥筆龍墀下願繼前朝天馬歌晚步院荒有古意僧少無人聲徘徊楠隂下賞此落日明著書亦何急寂寞身後名今年復止酒歌舞陳空觥不如且逍遙出門隨意行看竹入廢園望江上高城纎纎素月出靄靄蒼煙橫此夕當復竒緱山吹玉笙松驥行驥行千里亦何得垂首伏櫪終自傷松閲千年棄澗壑不如殺身扶明堂士生抱材願少試誓取燕趙歸君王閉門高卧身欲老聞雞相蹴淚數行正令咿嚶死牀簀豈若橫身當戰場半酣浩歌聲激烈車輪百轉盤愁腸春夜讀書感懷荒林梟獨嘯野水鵝羣鳴我坐蓬窗下答以讀書聲悲哉白髮翁世事已飽更一身不自恤憂國涕縱橫永懷天寶末李郭出治兵河北雖未下要是復兩京三千同德士百萬羽林營嵗周一甲子不見邊塵清賊酋實孱主賊將非人英如何失此時坐待姦雄生我死骨即朽青史亦無名此詩倘不作丹心尚誰明日出入行吾聞開闢來白日行長空扶桑誰能到崦嵫不可窮但見旦旦升天東但見暮暮入地中使我倐忽成老翁鏡裏衰顔垂雙蓬我願一日一百二十刻我願一生一千二百嵗四海諸公常在座緑酒金樽終日醉高樓錦繡中天開樂作畫鼓如春雷勸爾白日無西頺常行九十萬里胡為哉夜漏欲盡行渡浮橋至錢清驛待舟潮生抹沙岸雲薄漏月明江頭曉色動鴉起人未行扶携度長橋仰視天宇清遙憐繫舟人聽我高屐聲水檻得小憩一笑拄杖橫澄漪弄清影微風吹宿酲湛然方寸間不受塵事攖寄語市朝人此樂未易名江月歌放翁平生一釣船秋水未落江渺然露洗玉宇清無煙月輪徐行萬里天人間聲利何足捐浩歌看月冷不眠孤鶴掠水來翩翩似欲駕我從此仙我寓紅塵今幾年俯首韁鎖常自憐樂哉揮手過月邊西風未凋玉井蓮和伯子齋戒扣頭箋天公幸矣使我為枯蓬枯蓬於世百無用始得萬里乘秋風我生安然在貧賤白髮蕭蕭對黃卷今人雖賢有不覿古人却向書中見猿啼月落寒山空舊隱夢寐思東蒙不願峩冠赤墀下且可短劒紅塵中終年無人問良苦眼望青天唯自許可憐對酒不敢豪他日空澆墳上土文章最忌百家衣火龍黼黻世不知誰能養氣塞天地吐出自足成虹霓渡江諸賢骨已朽老夫亦將正丘首杜郎苦瘦帽擫耳程子苦貧衣露肘君復著意尋齊盟始知衰懦畏後生大篇一讀我起立喜君得法傳家庭鯤鵬自有天池著莫謂太狂須束縳大機大用君已傳那遣老夫安注腳讀書讀書四更燈欲盡胸中太華蟠千仞仰呼青天那得聞窮到白頭猶自信策名委質本為國豈但空取黃金印故都即今不忍説空宫夜夜飛秋磷士初許身輩稷契嵗晚所立慙廉藺正看憤切詭成功已復雍容託觀釁雖然知人要未易詎可例輕天下士君不見長松卧壑困風霜時來屹立扶明堂放翁詩選前集卷一
