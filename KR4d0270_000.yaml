body:
  text: 放翁詩選别集類三宋提要臣等謹案放翁詩選前集十巻後集八巻附别集一巻宋羅椅劉辰翁所選陸㳺之詩也前集椅所選元大徳辛丑其孫憼始刻之前有憼自序後集辰翁所選前後無序跋椅間有圏㸃而無評論辰翁則句下及篇末頗有附批大致與所評杜甫王維李賀諸集相似明人刻辰翁評書九種是編不在其中葢偶未見此本詳其詞意確為須溪門徑非偽托也末有明人重刻舊跋蠧蝕斷爛㡬不可讀並作者姓名亦莫辨其可辨者惟稱宏治某年得於餘杭學究家屬其同年餘杭知縣冉孝隆校刻之耳又稱放翁集抄本尚存然聞而未嘗見獨羅澗谷劉須溪所選在勝國時書肆嘗合而梓行以故轉相抄録迄今漸出而印本則見亦罕矣云云據其所言則兩人本各自為選其前集後集之目葢元時坊賈所追題矣跋又有複者去之之語故兩集所録無一首重見末附為别集一巻不題編纂名氏其詩皆見瀛奎律髓中以跋中取方虗谷句推之知即作跋者所輯以補二集之遺其中睡起至園中一首已見前集五巻中葢偶誤也劍南詩集汲古閣刻本今已盛行於世然此選去取頗不苟又宋人舊本故以陳亮歐陽文粹之例與本集並存之椅字子逺號澗谷廬陵人寳祐四年進士以秉義郎為江陵教官改潭州復知贑州信豐縣遷提轄𣙜貨徳祐初遭論罷周宻齊東野語記其當道學盛時依托求進道學勢衰之後遂棄去不相聞問深不滿之明偶桓乾坤清氣集皆録元人之詩而有其幼輿折齒歌一首葢元初尚存辰翁所著有評㸃班馬異同諸書已别著録乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀放翁詩選前集原序揀着吟人苦心䖏吟時較易揀時難大父澗谷翁題趙慶御手寫唐絶句結語也揀詩之難尚矣人謂刪後無詩非果無性情也特未有刪手爾族孫夀可以翁所選放翁陸先生詩刻本撫巻圭復涕淚盈睫悲夫善和書巻存者僅十一於千百而家蔵膏馥盖流潤人間實多有能思叔敖而繡諸梓真亢宗事也苐放翁天才豪邁筆勢遒勁屬事比偶不煩䋲削是編若圏若㸃去取自有深意非後學所能測識謂之有取於陸集可也謂即此以定陸集之刪削則未也然此特翁年少㳺戯細事爾遺編殘墨尚足得聲梁楚間獨不知後来一變至道亦有升堂入室而薫善良者否也手澤在笥願期同志切磋之大德辛丑立夏日適孫憼百拜謹識
