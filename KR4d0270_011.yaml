body:
  text: 放翁詩選後集卷一宋羅椅編古詩舟中對酒百壺載酒游凌雲醉中揮䄂别故人依依向我不忍别誰知峨眉半輪月月窺船牕掛淒冷欲别渝州酒初醒江空裊裊釣絲風人静翩翩葛巾影哦詩不睡月滿船清寒入骨我欲仙人間更漏不到處時有沙禽背船去漁翁江頭漁家結茅廬青山當門畫不如江煙淡淡雨踈踈老翁破浪行打魚恨渠生來不讀書江山如此一句無我亦衰遲慙筆力共對江山三歎息泊公安縣秦闗蜀道何遼哉公安渡頭今始囘無窮江水與天接不斷海風吹月來船牕帘捲螢火閙沙渚露下蘋花開少年許國忽衰老心折柂樓聞笛哀游合江園戱題朱朱白白池臺間好風妍日開未殘我來覔醉苦草草常恨不如花意閒山雞飛起亂花落下上青林穿翠壑世間動步即有拘常恨不如禽鳥樂人言功名恐不免我願徜徉娱嵗晚熟計滛書理白魚何如縱獵牽黄犬成都四郊如砥平安得雙鞬馳出城鞚飛塵起望不見從騎尋我鳴鶻聲題醉中所作草書巻後胷中磊落藏五兵欲試無路空峥嶸酒為旗鼓筆刀槊勢從天落銀河傾端溪石池濃作墨燭光相射飛縱横須臾収巻復把酒如見萬里煙塵清丈夫身在要有立匃奴運盡行當平何時夜出五原塞不聞人語聞鞭聲晚過五門五門路四月乳鴉啼綠樹閒遊但喜日初長薄暮始知春已去樓頭風髙舞雙旗畫角聲中日還暮馬啼得得無斷時老盡行人路如故春愁春愁茫茫塞天地我行未到愁先至滿眼如雲忽復生尋人似瘧何由避客中勸我飛觥籌我笑謂客君罷休醉自醉倒愁自愁愁與酒如風馬牛梅花氷崖雪谷木未芽造物破荒開此花神全形枯近有道意莊色正知無邪髙堅政要飽憂患放棄何遽愁荒遐移根上苑亦過計竹籬茅舍真吾家平生自嫌亦自許妙處可識不可誇金尊翠杓未免俗篝火為試江南茶和范舍人永康青城道中作風驅雨壓無浮埃驂驔千騎東方來勝游公自輩王謝净社我亦追宗雷􅡵山樓上一倚徙如地始闢天初開廓然眼界三萬里山一螘垤水一杯世間幻妄幾變㓕政自不滿吾曹咍丈夫本願布衣老達士詎畏蒼顔催君㸔神君嵗食羊四方處處棄骨髙成堆西山老翁飽松麫造物賦予何遼哉浣溪女江頭女兒䨇髻了常隨阿母供桑麻當戸夜織聲咿啞地爐豆䕸煎土茶長成嫁與東西家柴門相對不上車青裙竹笥何所嗟挿髻煜煜牽牛花城中妖姝臉如霞争嫁官中慕豪華青驪一出天之涯年年傷春抱琵琶八月十四夜三义市觀月去年看月籌邉樓雲罅㣲光如玉鈎主人不樂客歎息清歌空送黄金舟今年看月三义市纎雲不作良宵祟素娥命駕掃客愁我亦傾杯邀共醉風露萬里方𣺌然氷輪無轍行碧天盈盈耿耿意無盡月不忍落人忘眠一言欲報廣寒殿茅簷華屋均相見明年萬事不足論但願月滿人長健豐橋旅舍作我是山林人心期在塵表出門消底物兩屩萬事了羣兒何足愠為爾常悄悄今朝山中路更喜相識少三义市人醉争席豐橋逆旅留饋食小婦髻鬟髙一尺梭聲軋軋當戸織大雪歌長安城中三日雪潼闗道上行人絶黄河鐡牛僵不動承露金盤凍欲折虬髯豪客狐白裘夜來醉眠寶釵樓五更未醒已上馬衝雪却作南山遊千年老虎獵不得一箭横穿雪皆赤拏空争死作牛吼震動山村裂崖石曵歸擁路千人觀髑髅作枕皮蒙鞍人間壯士有如此胡不來歸漢天子大風登城風從北來不可當街市横吹人馬僵西家女兒午未粧帳裏爐紅愁下床東家喚客宴畫堂兩行玉指調絲簧錦繡四合如垣墻㣲風不動金猊香我獨登城望大荒勇欲為國平河湟材踈志大不自量西家東家笑我狂過筰橋道中龍祠小留江邉龍祠何年作白浪花中挿朱閣朝暾漸上宿霧收喜氣已動晨霜薄我來倚闌一悵然蘆花滿空如栁綿安得身為雙白鷺飛上灘頭却飛去游諸葛武侯書臺沔陽道中草離離卧龍老矣空遺祠當時典午稱猾賊氣喪不敢當王師定軍山前寒食路至今人祠丞相墓松風想像梁父吟尚憶幡然答三顧出師一表千載無逺比管樂葢有餘世上俗儒寧辦此高臺當日讀何書玻瓈江眉州共飲亭玻瓈江水千丈深不如江上離人心君行未過青衣縣妾心先到峨眉隂金尊共釂不知曉月落烟渚天横參車輪無角留不住馬蹄不方何處尋空憑尺素寄幽恨縱有緑綺誰知音愁來只欲掩屏睡無奈夢斷聞踈砧冬夜聞鴈有感從軍昔戍南山邉傳𤇺直照東駱谷軍中罷戰壯士閒細草平郊恣馳逐洮州駿馬金絡頭梁州毬場日打毬玉杯傳酒和鹿血匈奴降卒弹箜篌大呼抜幟思野戰殺氣當年赤浮面南游巴蜀已低摧猶據胡床飛白箭豈知蹭蹬還江邉病臂不復能開弦夜聞鴈聲起嘆息來時應過桑乾磧前有樽酒行虛堂雨過生凉颸勸君一醉君勿辭去年不知今年事明年萬事今得知舊時扶床同戯兒還鄉問訊令人悲冡丘纍纍在者誰紙錢雨濕抱樹枝君去六十有㡬時更望七十何其癡求師學道亦已遲謝客努力從䲭夷夏夜不寐急雨初過天宇濕大星磊落纔數十飢鶻掠簷聲磔磔冷螢墮水光熠熠丈夫無成忽老大箭羽凋零劔鋒澁徘徊欲睡復起行三更自凭䦨干立放翁詩選後集巻一
