body:
  text: 放翁詩選前集巻十宋羅椅編五言八句即事樽酒如江緑春愁扺草長但令閒一日便擬醉千場栁弱風禁絮花殘雨漬香客遊還役役心賞竟茫茫溪行篷蒻鳴春雨㠶蒲掛暮烟買魚尋近市覔火就鄰船愁卧醒還醉灘行却復前長年殊可念力盡逆風牽寓歎小雨初凉夜殘燈欲暗時病多愁近酒心弱怯題詩舊友殊方少歸耕晚嵗冝囘頭顧孤影此意有君知峽州甘泉寺江上甘泉寺登臨擅一州山亭喜無恙老子得重遊灘急常疑雨林深欲借秋歸途更清絶倚杖喚漁舟獨立獨立紫荆外頹然一秃翁亂山吞落日野水倒寒空憂患工催老飄零敢諱窮漁歌亦何恨悽斷滿西風病中風雨暗江天幽牕起復眠忍窮安晚境留病壓災年客助修琴料僧分買藥錢餘生均逆旅未死且陶然一室九萬笑鵬摶幽居一室寛雨聲便早睡酒力壓春寒嬾覺閒多味衰知死有縁此生吾自斷不必夢長安春晚苦雨垂老卧村墅餘寒欺病身雞猶未忘旦雨欲不容春忽忽花時過茫茫草色勻蓴絲已上市一飯未傷貧客有見過者既去喟然有作髪毛俱白盡事不補秋毫去死今無幾歸耕何足髙已如陶止酒徒勸屈餔糟惟有滄溟去揚帆看雪濤致仕後述懐生理雖貧甚胷中頗浩然常辭問字酒屡却作碑錢寜有駱堪鬻况無車可懸小須梅雨霽散髪醉江天孤村老寄孤村裏悠然卧曲肱筭貧先放鶴嫌閙并踈僧古戍髙秋笛寒牕半夜燈平生羞詭遇多獲豈吾能遊山病退行猶倦山坡毎少休髙枝聞鵲語淺瀬見魚游偶有堪乘興元無可遣愁悠然又終日争路有歸牛春日車馬閒中絶衣襦病後寛改詩消晝永賖酒敵春寒栁細搓難似花新染未乾歸鴻與來燕各自管悲歡醉賦霜楓照茅屋露菊挿紗巾今古無窮事江湖未死身直令依馬磨終勝拜車塵我亦輕餘子君當恕醉人小園蕭散遺塵事栽培得小園土鬆花意活林暖鳥言繁飱酪供晨鉢葅芹薦晚樽餘年君莫問送老向孤村舟中作沙路時晴雨漁舟日往來村村皆畫本處處有詩材炊黍孤煙晚呼牛一笛哀終身看不厭㟁幘興悠哉嵗晚書懐殘嵗堂堂去新春鼎鼎來夢移鄉國近酒挽壯心囘暖律初催栁晴光併上梅東湖有歸日衰抱得頻開野興有酒皆堪醉無山不可廬遂初成近賦孤憤悔前書湘寺分經帙廬山寄藥鋤江頭霜葉滿詩興属騎驢雨後凉甚並海寛閒野清秋揺落天㣲凉供美睡穏字入新聮陋屋蕭蕭雨脩筒細細泉晚牕生酒興洗酌一陶然月夜江瀆池納凉㣲徑荒城曲叢祠野水邊月能從我醉風欲駕人仙静數黏螢草遥聞采芡船熱官那有此留滯莫尤天長汀道中晚過長汀驛溪山乃爾竒老夫惟坐嘯造物為陳詩鳥送穿林語松垂拂澗枝憑鞍乆忘發不是馬行遲病中作一病二十日直愁難自還殘書不成讀長晝只供閒風舞迎霜葉雲昏欲雨山臨牕忽自笑詩思又相闗冐雨登擬峴臺觀江漲雨氣昏千嶂江聲撼萬家雲翻一天墨浪蹴半空花噴薄侵虚閣低昻泛斷槎壯遊思夙昔乘醉下三巴春雨春愁無處避春雨㡬時晴黯黯隂連月蕭蕭滴到明牕昏減書課絃緩咽琴聲何以娱幽獨新醅手自傾有叟有叟鏡湖邉茅茨八九椽凴䦨秋萬里閉户醉經年身外浮名小胷中浩氣全此身吾自判造物恐無權六月十四日㣲雨極凉湖上清秋近齋中白日長雲來樹收影雨過土生香蓮小紅衣濕𤓰甘碧玉凉晚來幽興動移榻近方塘夜雨寒雨連三夕幽居只數椽家貧輕過節身老怯増年日月悲歌裏闗山涙眼邉梅花自開落歎息為誰妍悶極有作貴已不如賤狂應又勝癡新寒壓酒夜㣲雨種花時堂下藤成架門邉枳作籬老人無日課有興即題詩春晚雜興池靣萍初紫墻頭杏已青携兒撑小艇留客坐孤亭相法無侯骨生年直酒星正須遺萬事莫遣片時醒自述二畝新蔬圃三間舊草堂病除身小健秋近夜㣲凉薄酒時醒醉殘書半在亡老懐常自笑無事忽悲傷梅天稻隴移初遍梅天澁未晴輕隂昏茗色餘潤咽琴聲時傍菱塘立還尋莎徑行杜門終此世更誓未來生獨夜燈花寒自結雪片夜方深瘦影叅危坐清愁入苦吟江湖身汗漫藥石病侵尋朋舊凋零盡何人識此心遊雲門諸蘭若花過木隂合溪雲生暮凉牛行響白水鷺下㸃青秧古寺宛如昨穉松森已行耆年不下榻童子為燒香五言四句題瑩上人剡溪畫天地又秋風溪山憶剡中孤舟幸閒着借我訪支公路傍曲二首其一冷飯雜沙礫短褐䝉霜露黄葉滿山郵行人跨驢去其二大道南北去車輪無停日彼豈皆竒才我獨飢至夕放翁詩選前集巻十
