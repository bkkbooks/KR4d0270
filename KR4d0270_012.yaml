body:
  text: 放翁詩選後集巻二宋羅椅編古詩成都行倚錦瑟擊玉壺吴中狂士游成都成都海棠十萬株繁華盛麗天下無青絲金絡白雪駒日斜馳遣迎名姝臙脂褪盡見玉膚緑鬟半脱嬌不梳吴綾便面對客書斜行小字宻復踈墨君秀潤瘦不枯風枝雨葉蕭蕭殊月浸羅襪清夜徂滿身花影醉索扶東來此歡墮空虚坐悲新霜㸃鬢鬚易求合浦千斛珠難覔錦江雙鯉魚十月九日與客飲忽記去年此時自錦屏歸山南道中小獵今又將去此矣去年縱獵韓壇側玉鞭自探南山雪今年痛飲蜀江邉金杯却吸峨眉月竹枝歌舞新敎成凄凉傳得三巴聲城頭築觀出雲雨峨眉正與䦨干平酒酣詩就擲盃去醉踏玻瓈江上路懸知幽澗斷橋邉已有梅花開滿樹銅雀妓武王在時敎歌舞那知涙洒西陵土君已去兮妾獨生生何樂兮死何苦亦知從死非君意偷生自是慚天地長夜昏昏死實難孰知妾死心所安得韓無咎書寄使北時宴東都驛中所作小闋大梁二月杏花開錦衣公子乘傳來桐隂滿第歸不得金轡玲瓏上源驛上源驛中槌畫鼓漢使作客敵作主舞女不記宣和粧廬兒盡能匈奴語書來寄我宴時詞歸鬢知添㡬縷絲有志未須深感慨築城㑹據拂雲祠春愁曲伏羲三十餘萬嵗春愁嵗嵗常相似外大瀛海環九州無有一州無此愁我願無愁但歡樂朱顔緑鬢常如昨金丹九轉徒可聞玉兔千年空搗藥蜀姫雙鬟姹婭嬌醉看恐是海棠妖世間無處無愁曲底事難過萬里橋曉歎一鴉飛鳴牕已白推枕欲起先歎息翠華東廵五十年赤縣神州滿兵革主憂臣辱古所云世間有粟吾得食少年論兵實狂妄諫官劾奏當竄殛不為孤囚死嶺海君恩如天豈終極容身有禄媿滿顔滅賊無期涙横臆未聞含桃薦宗廟至今銅駝没荆棘幽并從來多烈士悒悒可令長失職王師入秦駐一月傳檄足定河南北安得揚鞭出散闗下令一變旌旗色苦笋藜藿盤中忽眼明駢頭脱襁白玉嬰極知耿介種性别苦節乃與生俱生我見魏徴殊媚嫵約束兒童勿多取人才自古要養成放使干霄戰風雨同何元立賞荷花懐鏡湖舊游少壯欺酒氣吐虹一笑未了千觴空凉臺下簾人似玉月色泠泠透湘竹三更畫船穿藕花花為四壁船為家不須更踏花底藕但嗅花香已無酒花深不見畫船行天風空吹白紵聲雙槳歸來㺯湖水往徃湖邉人已起即今憔悴不堪論頼有何郎共此尊紅緑踈踈君勿歎漢嘉去嵗無荷看秋聲人言悲秋難為情我喜枕上聞秋聲快鷹下韝爪觜健壯士撫劔精神生我亦奮迅起衰病唾手便有從軍興弦開鴈落詩已成筆力未饒弓力勁五原草枯苜蓿空青海蕭蕭風捲蓬草罷㨗書重上馬却從鑾駕下遼東觀小孤山圖江平風不生鏡靣渺千里舸􅀈萬斛舟逺望一㸃耳大孤江中央四靣峭挿水小孤特竒麗丹翠凌雲起重樓䆳殿神所家帳中美人粲如花遊人倚徙䦨干處俊鶻横江東北去飲酒陸生學道欠力量胷次未能和盎盎百年自笑足悲歡萬事聊須付酣暢有時堆阜起峥嶸大呼索酒澆使平世間豈無道師與禪老不如閉門參麯生朋舊年來散如水唯有鐺杓同生死一日不見令人愁晝夜共處終無尤世言有毒在麯糵腐脇穿腸凝血脉人生適意即為之醉死愁生君自擇龍眠畫馬國家一從失西陲年年買馬西南夷瘴鄉所産非權竒邉頭嵗入㡬畨皮崔嵬瘦骨帶火印離立欲不禁風吹圉人大僕空列位龍媒汗血來何時李公太平官京師立仗慣見渥洼姿斷縑嵗久墨色暗逸氣向君不可羈賞竒好古自一癖感事憂國空餘悲嗚呼安得毛骨若此三千匹銜枚夜渡桑乾磧眉州郡讌大醉中間道馳出城宿石佛寺玻瓈春作江水清紫玉簫如雛鳯鳴漏聲不聞看燈燭俠氣未减欺飛觥單車萬里信有數二年三過寜忘情釵頭玉茗妙天下瓊花一樹真虚名酒酣忽作檀公䇿間道絶出東闗城清歌未斷去已逺回首城堞空峥嶸貂裘狐㡌醉走馬陌上應有行人驚徑投野寺睡正美魚鼓忽報江天明樓上醉歌我游四方不得意佯狂施藥成都市大瓢滿貯隨所求聊為疲民起憔悴瓢空夜静上髙樓買酒捲簾邀月醉醉中拂劔光射月往往悲歌獨流涕剗却君山湘水平斫却桂樹月更明丈夫有志苦難成脩名未立華髪生弋陽縣江上縣前竒哉一江水日暮風吹碧鱗起客浪征塵忽如洗不用金箆刮眸子丹楓岸邉雪色蘆下有老翁方捕魚欲求妙師貌畫圖王維鄭䖍今世無歩虛曩者過洛陽宫闕侵雲起今者過洛陽蕭然但荒壘銅駝卧深棘使我惻愴多可憐陌上人亦復笑且歌世事茫茫㡬成敗萬人看花身獨在北邙秋風吹野蒿古塚漸平新塚髙草書歌傾家釀酒三千石閒愁萬斛酒不敵今朝醉眼爛崖電提筆四顧天地窄忽然揮掃不自知風雲入懐天借力神龍戰野昏霧腥竒鬼摧山大隂黒此時驅盡胷中愁槌床大呌狂脱幘吴牋蜀素不快人付與髙堂三丈壁短歌行百年鼎鼎世共悲晨鐘暮鼔無休時碧桃紅杏易零落翠眉玉頰多别離涉江采菱風敗意登樓待月雲為祟功名常畏謗讒興冨貴毎同衰病至人生可歎十八九自古危機無妙手正令挿翮上青雲不如得錢即沽酒夜聞湖中漁歌夢囘一燈翳復明卧聞湖上漁歌聲嗚嗚乍低忽更起嫋嫋欲斷還㣲縈初隨缺月墮煙浦已和殘角吹江城悲傷似擊漸離筑忠憤如撫桓伊筝放臣萬里憂國涙戍客白首懐鄉情峽猿失侣方獨宿沙鴈垂翅猶遐征巴巫竹枝短亭晚瀟湘欵乃孤舟横世間此恨故相似使我百感何由平石首縣雨中繫舟短歌庚寅去吴西適楚秋晚孤舟泊江渚荒林月黒虎欲行古道人稀鬼相語鬼語亦如人語悲楚國繁華非昔時章華臺前小家住茅屋雨滴秋風吹悲哉秦人真虎狼欺侮六國囚侯王亦知興廢古來有但恨不見秦先亡開牕酹汝一盃酒等為亡國秦更醜驪山冡破已千年至今過者無傷憐陶山遇雪覺林迂庵主見招不果往赴山中大雪二尺强道邉虎跡如椀大衰翁畏虎復畏寒招喚不來公勿怪梨花開時好風日走馬尋公作寒食不須沽酒飲陶潜箭笋蕨芽如蜜甜放翁詩選後集巻二
