  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0270_WYG_002-1a, image: WYG1163/WYG1163-0733c.png}
body:
  text: 放翁詩選前集卷二宋羅椅編古詩偶過浣花感舊遊戲作憶昔初為錦城客醉騎駿馬桃花色二人携手上江樓一笑鈎簾賞微雪寶叉換酒忽徑去三日樓中香未滅市人不識呼酒仙異事驚傳一城說至今西壁餘小草過眼年光如電掣正月錦江春水生花枝闕處小舟橫閒倚胡床吹玉笛東風十里斷腸聲步出萬里橋門至江上久坐意不懌掩卷聊出遊一笻吾事足安用車與騶浮生了無根兩踵踏百州常憶航巨海銀山卷濤頭一日新雨霽微茫見流求西行亦足快縱獵南山秋騰身刺猛虎至今血濺裘命薄每自笑校尉略已侯短劒隱市塵浩歌醉江樓頗疑屠博中可與共竒謀丈夫等一死滅賊報國讎徙倚萬里橋寒日墮前洲宿龍華山中寂然無一人方丈前梅花盛開月下獨觀至中夜梅花如高人枯槁道愈尊君看在空谷豈比倚市門我來整冠佩潔齊三沐熏亦思醉花下燕惰恐瀆君敬抱緑綺琴𤣥酒挹古樽月明流水間一洗世濁昏摹寫香與影計君已厭聞老我少傑思尚喜非陳言臨别成都悵飲萬里橋贈談德稱成都城南萬里橋蘆根蘋末風蕭蕭映花碾草紅車小駐坡驀澗青驄驕入門翠徑絶窈窕臨水飛觀何岧嶤判無功名著不朽惟仗詩酒寬無聊清霜早已足雉兔微冷便欲思狐貂喜看縷鱠映盤箸恨缺斫蟹加橙椒坐中談侯天下士龍馬毛骨矜超遙烏犀白紵謫仙樣但可邂逅不可招今年一戰馘餘子風送六翮凌青霄美人再拜乞利市醉墨飛落生蛟綃我衰於世百無用十年不趂含元朝華纓肯傍蕭颯鬢寶帶那束龍鍾腰祝君好去事明主日望分喜來漁樵遊談引類亦細事寄酒且解相如消聽琴疏簾曲檻蘋風涼細腰美人藕絲裳緑藤水紋穿矮牀玉指纎纎彈履霜高林鶯囀日正長幽澗泉鳴夜未央哀思不怨和而莊有齊淑女禮自防世人但惑青樓倡琵琶箜篌雜胡羌試聽一曲醒汝狂文姬指法傳中郎瑞草橋道中作經年簿書無少暇欵假今朝欣一跨瑞草橋邉水亂流青衣渡口山如畫老翁醉著看龍鍾小婦出窺聞婭姹荒陂吹笛晚呼牛古路倚梯晨採柘殘花零落不禁折香草丰茸如可藉郵亭慈竹筍穿籬野店蒲萄枝上架功名垂世端有待利欲昏心喜乘鏬羇窮自笑豈人謀間放每欲從天借草根蟲語祇自悲風裏蓬征安稅駕祖師補處浣花村㑹傍清江結茅舍夜宿陽山磯將曉大雨北風甚徑俄頃行三百里遂抵鴈翅浦五更顛風吹急雨倒海翻江洗殘暑白浪如山潑入船家人驚怖篙師舞此行十日苦滯留我亦蘆叢厭鳴櫓書生快意輕性命十丈蒲帆百夫舉星馳電騖三百里坡壠聨翩雜平楚船頭風浪聲愈厲助以長笛撾鼉鼓豈惟澎湃震山嶽直恐澒洞連后土起看草木盡南飛水鳥號呼集洲渚稽首龍公謝風伯區區未禱煩神許應知老去負壯心戲遣窮途出豪語航海我不如列子神遊御天風尚應似安石悠然雲海中卧看十幅蒲彎鸞若張弓潮來湧銀山忽復摩青銅飢鶻掠船舷大魚舞虛空流落何足道豪氣蕩肺胸歌罷海動色詩成天改容行矣跨鵬背弭節蓬萊宫江樓吹笛飲酒大醉中作世言九州外復有大九州此言果不虛僅可容吾愁許愁亦當有許酒吾酒釀盡銀河流酌之萬斛玻瓈舟酣宴五城十二樓天為碧羅幕月作白玉鈎織女織慶雲裁成五色裘披裘對酒難為客長揖北辰相獻酬一飲五百年一醉三千秋却駕白鳳驂班虬下與麻姑戲𤣥洲錦江吹笛餘一念再過劒南應小留長歌行我無四目與兩口但在人間更事久死生元是開闔眼禍福正如翻覆手消磨日月幾緉屐陶鑄唐虞一杯酒既非狗馬要蓋帷那計風霜碎蒲栁竈突無煙今又慣龜蟬與我成三友判知青史無功名只用一飢垂不朽開嵗半月湖村梅開無餘梅花如高人妙在一丘壑林逋語雖工竟未脫纒縳乃知尤物側天下無傑作老我懷不舒樽前幾開落一百五日行一百五日東郊時陂塘水滿雨如絲人家青煙不禁火俚俗豈復思子推舊墳年多木已拱新墳積土高纍纍老鴉飛來復飛去紙錢雨濕掛樹枝深松茂柏死自樂地下應笑生人悲眼中青山身後塜此事决定君何疑風吹雲破日下照小灘碎礫光陸離停車暫憩道傍舍解囊且補殘春詩對酒懷丹陽成都故人勞生常羡髑髏樂死時却悔生時錯花前有酒不肯狂回首朱顔已非昨君看古來賢達人終日飲酒全其真世間萬事竟何有金樽翠杓差閒身放翁少日無閒客飛觴縱樂皆豪傑清歌一曲梁塵起腰肢粉面春雷發故人仙去蓬萊宫鸞絲鳳竹舞春風石帆山下孤舟雪一假清愁付此翁答客人生各有營為吏最無䇿其間小黠者但肯乘下澤絶筆光範書掃迹翹材客早收畏塗身未老歸阡陌嗟豫昧擇術誤計真纍百衰容始知悔泯默每自責孤舟寄渺莽尚恨江湖迮客來勿多談窮命不禁嚇夏白紵二首古有四時白紵亦有止作一時者丙申五月在成都烈暑可畏戲作雲母屏薄望如空水晶簾踈不礙風美人獨立何所似白玉芙蕖秋水中素綃細織氷蠶縷清寒不受人間暑晚來浴罷緑窗閒自把新詩教鸚鵡翔鸞矯矯離風塵眼明見此絶代人紗窗弄筆消永日臨得黃庭新逼真飛樓縹眇今何夕月與玉人同一色下簾不為九霄寒自要玲瓏看團璧故蜀别苑在成都西南十五六里梅至多有兩大樹夭矯若龍相傳謂之梅龍豫初至蜀嘗為作詩自此嵗常訪之今復賦此昔年曽賦西郊梅茫茫去日如飛埃即今衰病百事懶陳迹未忘猶一來蜀王故苑犂已遍散落尚有千雪堆珠樓玉殿一夢破煙蕪牧笛遺民哀兩龍卧穩不飛去鱗甲脫落生莓苔精神每遇雪月見氣力苦戰氷霜開羇臣放士耿獨立淑姬靜女知誰媒摧傷雖多意愈厲直與天地爭春回蒼然老氣壓桃杏笑我白髮心尚孩微風故為作嫵媚一片吹入黃金罍芳華樓賞梅素娥竊藥不奔月化作江梅寄幽絶天工丹粉不敢施雪洗風吹見真色出籬藏塢香細細臨水隔煙情脉脉一春花信二十四縱有此香無此格放翁年來百事惰惟見梅花愁欲破金壺列置春滿屋寶髻斜簮光照坐百榼淋漓玉斚飛萬人辟易銀鞍過不惟豪橫壓清臞聊為詩人洗寒餓遊仙飄飄鸞鶴杳難攀萬里東遊海上山應有世人遙稽首紫簫餘調落雲間初珥金貂謁紫皇仙班最近玉爐香為憐未慣層霄冷獨賜流霞九醖觴玉殿吹笙第一仙花前奏罷色凄然憶曽偷學春愁曲謫在人間五百年天王廣教院在蕺山東麓豫年二十時與老僧惠迪遊略無十日不到也淳熙甲辰秋觀潮海上偶繫舟其門曳杖再遊恍如隔世遊山如讀書深淺皆可樂道傍小精舍亦自一丘壑凄涼四十年始復重著腳老僧逝已久講坐塵漠漠當時童子輩衰鬢亦蕭索掃壁觀舊題嵗月真電雹文章卑不傳衣食窘如昨出門意惘然遼海渺孤鶴登鵝鼻山至絶頂訪秦刻石且北望大海山路危甚人跡罕至也街頭旋買雙芒屩作意登山殊不惡蒼崖無罅竹鞭逸崩石如墜松根絡憑高開豁快送目厯險﨑嶇危著腳川雲忽起兩蛟舞瀑水高吹萬珠落大巖空控誰所刳絶壁峭立端疑削坡平或可容百人峽束僅容飛一鶴蛇蹊岌岌頭自眩鬼谷慘慘神先愕秦皇鳥迹散莓苔如鐫非鐫鑿非鑿殘碑不禁野火燎造物似報焚書虐人民城郭俱已非煙海浮天獨如昨十月二十六日夜夢行南鄭道中既覺恍然攬筆作此詩詩成時已五鼓孤雲兩角不可行望雲九井不可度嶓冡之山高插天漢水滔滔日東去高皇試劒石為分草沒苔封猶故處將壇坡陀過千載中野疑有神物護我時在幕府來往無晨暮夜宿沔陽驛朝飯長木鋪雪中痛飲百榼空蹴踏山林伐狐兔耽耽北山虎食人不知數孤兒寡婦讎不報日落風生行旅懼我聞投袂起大呼聞百步奮戈直前虎人立吼裂蒼崖血如注從騎三十皆秦人面青氣奪空相顧國家未發度遼師落魄人間傍行路對花把酒學醖藉空辱諸公誦詩句即今衰病卧在床振臂猶思備征戍南人孰謂不知兵昔者亡秦楚三户放翁詩選前集卷二
