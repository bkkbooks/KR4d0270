body:
  text: 放翁詩選前集卷三宋羅椅編七言八句雨晴遊洞宮山坐間復雨近水松篁鎖翠微洞天宫殿對清輝快晴似為酴醿計急雨還妨燕子飛道士晝間丹竈冷山童曉出藥苖肥拂床不用勤留客我困文書自怕歸醉中到白崖而歸醉眼朦朧萬事空今年痛飲瀼西東偶呼快馬迎新月却上輕輿御晚風行路半生常是客丈夫八十未稱翁亂山缺處如橫線遙指孤城翠霧中深居作吏難堪簿領迷深居聊復學幽棲病來酒户何妨小老去詩名不厭低零落野雲寒傍水霏微山雨晚成泥自憐甫里家風在小摘殘蔬繞廢畦題丈人觀道院壁斷煙浮月磬聲殘木影如龍布石壇偶駕青鸞塵世窄間吹玉笛洞天寒竒香滿院晨炊藥異氣穿巖夜浴丹却笑飛仙未忘俗金貂猶著侍中冠宿江原縣東十里張氏亭未明而起寸廪驅人卒嵗勞一官坐失布衣高劒南十月霜猶薄江上五更雞亂號孤枕擁衾尋短夢青燈照影著征袍客愁相續無時斷那得并州快剪刀晚登橫溪橋二首樓鼓聲中日又斜憑高愈覺在天涯空桑客土生秋草野渡虛舟集晚鴉瘴霧不開連六詔俚歌相答帶三巴故鄉可望應添淚莫恨雲山萬疊遮犖確坡頭笻竹枝西臨村路立多時賣蔬市近還家早煮井鹽也人忙下麥遲病客情懷常怯酒山城光景盡供詩晚來試問愁多少只託高樓橫笛吹武擔東臺晚望憔悴西窗已一翁登高意氣尚豪雄關河霸國興亡後風月詩人醉醒中病起頓驚雙鬢改春歸一掃萬花空欄邊徙倚君知否直到吳天目未窮待青城道士不至我亦從來薄世緣偶然采藥到西川慵追萬里騎鯨客且伴千年化鶴仙金鼎養丹暾海日玉壺取酒醉江天朝來坐待方平久讀盡黃庭內外篇學射道中感事學射山前宿雨收籃輿咿軋自生愁得間何惜傾家釀漸老真須秉燭遊道廢尚書猶乞米時來校尉亦封侯自憐白首能豪在車轍何因遍九州登劒南西川門感懷自古高樓傷客情更堪萬里望吳京故人不見暮雲合客子欲歸春水生瘴癘連年須藥石退藏無地有柴荆諸公勉畫平戎䇿投老深思看太平城上疾步登城殊未衰欣然一笑擲笻枝正當間似白鷗處不減健如黃犢時秋野煙雲橫慘淡暮天樓閣倚參差高吟醉舞忘歸去乞與丹青畫怪竒早行喔喔鳴雞促起程翻翻飛鷺導孤征節旄盡脫歸猶逺帶眼頻移瘦自驚小市蕭條黃葉滿斷橋零落緑苔生居人猶復多愁患何况天涯倦客情秋晚登城北門幅巾藜杖北城頭卷地西風滿眼愁一點烽傳散關信兩行鴈帶杜陵秋山河興廢客搔首身世安危人倚樓橫槊賦詩非復昔夢魂猶繞古梁州醉中偶書古寺間房閉寂寥幾年耽酒負公朝青山是處可埋骨白髮向人羞折腰末路自悲終老蜀少年常願從征遼醉來挾箭西郊去極目寒蕪雉兔驕浣花賞梅老子人間自在身插梅不惜損烏巾春回積雪層氷裏香動荒山野水濵帶月一枝低弄影背風千片逺隨人石家樓上貪吹笛肯放朝朝玉樹新蜀苑賞梅十里溫香撲馬來江頭還見去年梅喜開剩欲邀明月愁落先教掃緑苔跌宕放翁新醉墨凄涼廢苑舊歌臺盛衰自古無窮事莫向昆明歎劫灰席上作緑波畫槳浣花船清簟疏簾角黍筵一幅葛巾林下客百壺春酒飲中仙散懷絲管繁華地寄傲江湖浩蕩天浮世升沉何足計丹成碧落珥貂蟬客愁騎馬出門無所詣端居正爾客愁侵蒼顔白髮入衰境黃卷青燈空苦心天下極知須雋傑書生何恨死山林消磨未盡胸中事梁甫時時尚一吟送梅零落梅花不自由斷腸容易付東流與人又作經年别問月應知此夜愁已是狂風卷平野不禁橫笛起危樓何時小雪山隂路處處尋香繫釣舟即席解鞅名園眼倍明殷勤翠袖勸飛觥海棠紅杏欲無色蛺蝶黃鸝俱有情去日不留春漸老歸舟已具客將行倦遊短鬢無多緑生怕樽前唱渭城舟過小孤有感小孤山畔峭帆風又見煙鬟縹眇中萬里客經三峽路千篇詩費十年功未嘗滿盎蒲芽白先看堆盤鱠縷紅商略人生為何事一蓑從此入空濛題齋壁葺得湖邊屋數椽茅齋低小竹窗妍墟煙寂厯歸村路山色蒼寒釀雪天性懶杯盤常偶爾地偏雞犬亦翛然早知栗里多幽事虛走人間四十年夜行宿湖頭寺卧載籃輿黃葉村踈鐘杳杳隔溪聞清霜十里伴微月斷鴈半行穿亂雲去國不堪心破碎平戎空有膽輪囷泗濵樂不應如舊誰勒中原第一勳雪後出遊戲作小巘平岡雪陸離幽人又賦探春詩典琴沽酒元非俗著屐觀碑又一竒大度乾坤容落魄多情風月笑衰遲吾生也似梅花淡燕未歸來蝶未知村居書觸目雨霽郊原刈麥忙風清閭巷曬絲香人饒笑語豐年樂吏省徴科化日長枝上花空間蝶翅林間椹熟滑鶯吭飽知遊宦無多味莫恨為農老故鄉感昔二首三著朝冠入上都黃封頻醉渴相如馬慵立仗寧辭斥蘭偶當門敢怨鋤富貴尚思還此笏衰殘自合愛吾廬燈前目力依然在且盡山房萬卷書五丈原頭秋色新當時許國欲忘身長安之西過萬里北斗以南惟一人往事已如遼海鶴餘年空羡葛天民腰間白羽凋零盡却照清溪整角巾夜半讀書罷出門徙倚久之歸賦短句浩歌曳杖出柴扉不管三更露濕衣擬看林梢殘月上偶逢浦口斷雲歸驚鴻脫網寒相倚飢鶻思巢夜亦飛却掩北窗誰晤語聊憑香碗洗塵機寓歎千載前人每暗同眼邊俗客馬牛風作文似可張子布飲酒思從陳孟公半世氛埃成潦倒幾時蓑釣入空濛一生處處皆堪老莫怕無山著此翁放翁詩選前集卷三
