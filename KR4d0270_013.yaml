body:
  text: 放翁詩選後集巻三宋羅椅編古詩明河篇明河八月轉分明炯如素練西南傾年年嵗嵗見河漢坊坊曲曲聞砧聲良人萬里事征行砧聲中有玉闗情遥知鐡衣冷如水指㸃明河白髪生磧中草死駱駝鳴萬里却望長安城兒生總角爺未見歸心頓覺封侯輕漢家昔日事兵革絶越窮荒何足惜只願無光太白低還家為婦説征西對酒羡門安期何在哉河流上泝崑崙開白雲不與隠居老孤鶴自下遼天來春江風物政閒美緑浦潮平柂初起暮吹長笛發巴陵曉掛髙帆渡湘水世間萬變更故新㑹當太息摩銅人脱裘取酒藉芳草與子共醉壺中春飲酒近村放翁睡多少行立人扶往赴鄰里集痛飲山花挿鬢紅醉歸荆棘沾衣濕紗巾一幅何翩翩庭中㺯影不肯眠莫欺此老今衰甚曽見髙皇狩越年黄山塔風吹旗脚西南開掛帆槌鼓何快哉轉頭已失望夫石黄山孤塔迎人來黄山勸汝一杯酒送徃迎來殊耐久明年我作故鄉歸還對黄山一搔首送三兄赴秦邸兄年十七弟始生弟今白髪森千莖所期相就畢此世一樽濁酒得共傾往年雖窮猶半菽兩年糠覈苦不足書生志欲及天下貧賤不得收骨肉過悲復恐兄意傷忍涕不覺涕已滂早朝霜露戒衣薄願書此語懽或忘閉門病衰百無用日望兄歸有餘俸早從丞相乞湖州莫待異時思少游吴娘曲鏡奩蚕出千黒蟻釵梁梅小䨇青豆吴娘十四未知愁羅衣已覺傷春瘦閒尋女伴過西家鬭草歸來日未斜睡睫濛濛嬌欲閉隔簾㣲雨壓楊花題少陵畫像長安落葉紛可掃九陌北風吹馬倒杜公四十不成名䄂裏空餘三賦草車聲馬聲喧客枕三百青銅市樓飲杯殘臠冷正悲辛㐲内閗雞催賜錦荆州歌楚江鱗鱗緑如釀銜尾江邉繫朱舫東征打鼓掛髙㠶西上湯豬聮百丈伏波古廟占好風武昌白帝在眼中倚樓女兒笑迎客清歌未盡千觴空沙頭巷陌三千家煙雨㝠㝠開橘花峽人住多楚人少土鐺争上茱茰茶東吴女兒曲東吴女兒語如鸎十三不肯學吹笙鏡奩初喜稚蚕出牕眼已看雙繭成庭空日暖花自舞簾巻巢乾燕新乳阿弟貪書下學遲獨揀詩章敎鸚鵡芳草曲蜀山深處遮孤驛缺甃傾垣芳草碧家在江南妻子病離鄉半嵗無消息長安城門西去路細靄斜陽芳草暮尊前一曲渭城歌馬蹄萬里交河戍人生誤計覔封侯芳草愁人春復秋只願東行至滄海路窮草斷始無愁古别離孤城窮巷愁寂寂美人停梭夜歎息空園露濕荆棘枝荒蹊月照狐狸迹憶君去時兒在腹走如黄犢爺未識紫姑吉語元無凴况憑瓦兆占歸日嫁來不省出門前夢魂何由識酒泉粉綿磨鏡不忍照女子盛時無十年夜聞松聲有感清晨放船落星石大風吹㠶如箭激回頭已失廬山雲却上吴城㸔落日夜深龍歸擘祠門入木數寸留爪㾗明朝就視心尚慄腥風巻地雷霆奔歸船買酒特自慰性命平生驚屡試固知神怒有定時波紋蹙作魚鱗細如今衰病卧林坰霜覆茅簷月滿庭松聲驚破三更夢猶作當時風浪聴滄灘百夫正讙助鳴艣舟中對靣不得語須㬰人散寂無譁惟聞百丈轉兩車嘔嘔啞啞車轉急舟人已在沙際立霧歛蘆村落照紅雨餘漁舍炊烟濕故鄉回首已千山上峽初經第一灘少年亦慕宦游樂投老方知行路難瞿塘歌四月欲盡五月來峽中水漲何雄哉浪花髙飛暑路雪灘石怒轉晴天雷千艘萬舸不敢過篙師柂工心膽破人人隂拱待勢衰誰敢輕行犯竒禍一朝時去不自由山腹空有沙㾗留君不見陸子嵗暮來䕫州瞿塘峽水平如油蹋磧鬼門闗外逢人日蹋磧千家萬家出竹枝慘戚雲不動劔氣聮翩日初夕行人十有八九癭見慣何曽羞顧影江邉沽酒沙上卧峽口月出風吹醒人生未死信難知憔悴䕫州生鬢絲何日畫船揺桂檝西湖却賦探春詩風雨中望峽口諸山竒甚白鹽赤甲天下雄抜地突兀摩蒼穹凜然猛士撫長劔空有豪氣無雍容不令氣象久停滀常恨天地無全功今朝忽悟始嘆息妙處元在煙雨中太隂殺氣横慘淡元化變態含空濛正如竒材遇事見平日乃與常人同安得朱樓髙百尺看此疾雨吹横風岳池農家春深農家耕未足原頭叱叱兩黄犢泥融無塊水初渾雨細有痕秧正綠緑秧分時風日美時平未有差科起買花西舍喜成婚持酒東鄰賀生子誰言農家不入時小姑畫得城中眉一雙素手無人識空村相喚㸔繰絲農家農家樂復樂不比市朝争奪惡宦游所得能㡬何我已三年廢東作驛路海棠已過有感淒凉古驛官道傍朱門沉沉春日長暄妍光景老海棠顛風吹花滿空廊物生憔悴固其常惜哉無與持一觴遊蜂戲蝶空自忙豈知美人在西廂我雖已老猶能狂竚立與爾悲容光盛時不遇誠可傷零落逢之更斷腸夜登江樓平生胷中無滯留曠然獨與造物游天風駕我周㝢縣夜半忽過江邉樓樓前茫茫天地闊萬頃月浸空江秋雲堦無塵鸞鶴舞玉笛裂石魚龍愁肺肝澄徹納灝氣毛髪慘慄臨寒流世間回首真一夢誰能更念酬恩讎東山今日之集何佳哉入闗劇飲始此回登山正可小天下跨海何用尋蓬萊青天肯為陸子見妍日似趣梅花開有酒如醅綠可愛一醉真欲空千罍酡酥鵝黄出隴右熊肪玉白黔南來眼花耳熱不知夜但見銀燭髙花摧京華故人死大半歡極往徃潜生哀聊將豪縱壓幽患皷吹動地聲如雷放翁詩選後集巻三
