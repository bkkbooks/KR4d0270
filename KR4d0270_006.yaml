body:
  text: 放翁詩選前集巻六宋羅椅編七言八句舟中夜賦千里風塵季子裘五湖煙浪志和舟燈殘復吐惱孤夢雨落還收生旅愁城上霜笳入霄漢煙中漁火耿汀洲牧之未極詩人趣但謂能輕萬户侯賞花至湖上吾國名花天下知園林盡日敞朱扉蝶穿宻葉常相失蜂戀繁香不記歸欲過每愁風蕩漾半開却要雨霏㣲良辰樂事真當勉莫遣匆匆一片飛春夏屡病至立秋而愈因自賀良藥扶衰扺萬金漸加糜粥輟呻吟溪風拂簟有秋意山影當窓生夕隂薄俗只成驚老眼幽居正得遂初心岸巾待月䦨干曲更覺天公愛我深卜築放翁卜築寄江郊屋破隨時旋補茅暮看白煙横水際曉聽清露滴松梢生來不啜猩猩酒老去那營燕燕巢目斷鹿門三太息龐公千載可論交東牎小酌烏㡌翩僊白苧裳東牎隨事具杯觴流年不貸世人老造物能容吾輩狂藤葉成隂山鳥下檜花滿地蜜蜂香何人畫得農家樂咿軋繅車隔短墻嵗晚無窮世事浩難量嵗晩沉緜卧草堂短褐拆圖移曲折故書經蠧失偏傍賣刀擬買春耕犢挾䇿曽亡舊牧羊㸃檢生涯還自笑菜畦殘葉帶新霜冬暮晚角昏鐘為底忙豈容老子更禁當乗除冨貴惟身健補貼光隂有夜長臨水小軒初見月満庭殘葉不禁霜巴江尺素何時到剰著新詩寄斷腸題庵壁孤村寂寂潮生浦小院昏昏雨送梅蔬食一簞宜面槁畏塗九折自心灰古人骨朽有書在今雨泥多无客來散髪佯狂非寄傲世間萬事本悠哉泛舟澤中雨夜無窮煙浪接空濛秦望稽山醉眼中虹斷已收千嶂雨鶴歸正駕九天風漁舟容與横沙際水鳥號呼傍葦叢興盡還家忽三鼔半輪殘月斗杓東秋懐形骸嵗嵗就枯朽意氣時時猶激昻水逺浮鷗猶浩蕩霜高殘菊更芬芳人皆有老是非在刼未成灰時世長三百里湖行自復子孫努力事耕桑書感奪璧元知價不酬屠龍誰信本无求哦詩聲裏嵗時速憂國淚邊天地秋已欠謝安俱泛海况无王粲與登楼此身著䖏憑君記萬里煙波没白鷗舟中作三百里湖新月時放翁艇子出尋詩城頭蜃閣煙將合波面虹橋栁未衰漁唱蒼茫連禹穴寒潮蕭瑟過娥祠祖龍虚負求仙意身到蓬萊却不知寓歎俗心浪自作棼絲世事元知似奕棋舊業蕭然歸亦樂餘年至此死何悲古人可作將誰慕造物何心豈汝私已决殘春故溪去短蓑垂釣月明時村居青藜杖出氛埃外白版扉開水竹邊造物與閒仍與健郷人知老不知年齋居毎袖持螯手妄想寕流見麴涎昨夜小庭風露冷菊花消息已先傳道室雜詠三首舄化雙鳬杖化龍雲山回首不知重藥園夜嘯丹臺月酒市秋聽紫閣鐘豈憚煙霄隨歩武故應氷雪換形容小童開户驚竒事野鶴來巢堦下松莫怪先生閱事多人間何處不經過天山八月霜枯草𤾉谷三更日浴波酒熟春風歸掌握丹成神物共誰何散人本帶江湖號四百年來一釣蓑身是秋風一斷蓬何曽住處限西東棋枰牎下時聞雹丹竈巖間夜吐虹采藥不辭千里去釣鰲曽破十年功白頭始悟頤生妙盡在黄庭兩巻中遣興聒聒鳴鳩莫笑渠百年我亦旋枝梧病知藥物難為驗老覺人間不足娛茅屋何妨度寒暑蔬飡且可逐朝脯釣船一去无尋處千頃江邊一色蘆病中柬仲彌性唐克明蘇訓直三君皆有歸志移疾還家暫曲肱依然耐乆北牎燈心如澤國春歸鴈身是雲堂旦過僧細雨佩壺尋廢寺夕陽下馬弔荒陵小留莫厭時追逐勝社年來冷欲冰晩泊松滋渡口小溪拍拍鸕鷀飛深竹蕭蕭杜宇悲看鏡不堪衰病後繫船最好夕陽時生涯落魄惟耽酒客路蒼茫自詠詩莫問長安在何許亂山孤店是松滋秋日懐東湖小閣東頭罨畫池秋來長是憶幽期身如巢燕臨歸日心似堂僧欲動時病思羇懐惟付酒西風落日更催詩故知嵗暮常多感不獨當年宋玉悲醉郷醉郷卜築亦佳哉但苦無情白髪催癡欲煎膠粘日月狂思入海訪蓬萊辭巢歸燕先秋去泣露幽花近社開莫惜傾家供作樂古人白骨有蒼苔寄題陳魯山二首時調官都下諸公貴人識面稀胷中璀璨漫珠璣即今舉手遮西日應有流塵化素衣舊學極知難少貶吾儕持此欲安歸夜來風雨空堂静忽憶燈前語入㣲天下無虞國論深書生端合老山林平生力學所得處政要如今不動心舊友幾年猶短褐謫官萬里少來音願公思此寛羇旅静處炎曦豈易侵病中作老鶴遼天興未窮此生光景自匆匆家為逆旅相逢處身在嚴裝欲發中澁眼尚於書有味孤愁殊覺酒無功揮戈草檄今誰記嵗晩江邊白髪翁燈下看梅風雨經旬怯倚䦨梅花折得就燈看有情應記去年别無寐不禁清夜寒病起支笻幽興在春遲載酒後期寛籬東数樹尤竒絶日遣蠻童候路乾江楼醉中作淋漓百榼宴江楼秉燭揮毫氣尚遒天上但聞星主酒人間寧有地埋憂生希李廣名飛將死慕劉伶贈醉侯戯語佳人頻一笑錦城已是六年留退之詩越女一笑三年留放翁詩選前集巻六
