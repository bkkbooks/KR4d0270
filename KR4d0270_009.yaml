body:
  text: 放翁詩選前集卷九宋羅椅編七言四句小園小園煙草接鄰家桑柘隂隂一徑斜卧讀陶詩未終卷又乘微雨去鋤瓜湖上今嵗遊人頗盛戲作二首畫船鼓吹載凉州不到三更枉出遊忽有歌聲出雲漢誰家開宴小紅樓臺府官醅嵗嵗新蘭亭春勝鏡湖春三山小甕雖堪笑也向湖邉作醉人雜感二首百年鼎鼎成何事寒暑相催即白頭縱得金丹真不死摩挲銅狄更添愁世間魚鳥各飛沉茅屋青山無古今畢竟替他愁不得幾人虛費一生心劔南道中遇微雨衣上征塵雜酒痕逺遊無處不銷魂此身合是詩人未細雨騎驢入劔門三峽歌五首神女廟堂秋月明黃牛峽裏暮猿聲危塗性命不容惜百丈牽船侵夜行十二巫山見九峯船頭彩翠滿秋空朝雲暮雨渾虛語一夜猿啼明月中亂插山花篢子紅蠻歌相和瀼西東忽然四散不知處踏月捫蘿歸峒中萬州溪西花栁多四鄰相應竹枝歌問君今夕不痛飲奈此滿川明月何我遊南賔春暮時蜀船曽繫掛猿枝雲迷江岸屈原塔花落空山夏禹祠春日絶句怕見公卿懶入城野橋孤店跨驢行天工遣足看山願白盡髭鬚却眼明閒中自詠小艇上時皆緑水短笻到處即青山二十四考中書令不換先生半日閒讀經藜羮粟飯養殘軀晨起衣冠讀典謨莫謂書生無用處一身自是一唐虞梅花絶句聞道梅花折曉風雪堆遍滿四山中何方可化身千億一樹梅花一放翁雜興一身逋負愁賖酒滿眼關山海上樓子細推來惟合睡五更風雨已如秋聞鳥聲有感流年冉冉去無情日夜溪頭布榖聲城郭雖存人換盡令威應悔學長生七月十四夜觀月不復微雲滓太清浩然風露欲三更開簾一寄平生快萬頃空江著月明巴東遇小雨暫借清溪伴釣翁沙邉微雨濕孤蓬從今詩在巴東縣不屬灞橋風雪中雪後尋梅二首雪裏芬芬亦偶然世人便謂占春前飽知桃李俗到骨何至與渠爭著鞭竹籬曲曲水邉村月淡霜清欲斷魂商略前身是飛燕玉肌無粟立黃昏庚子正月十八日送梅二首滿城桃杏爭春色不許梅花不成雪世間尤物無盛衰萬㸃縈風正竒絶我行柯山眠酒家初見窗前三四花恨無壯士挽斗柄坐令東指催年華采蓮雲散青天掛玉鈎石城艇子近新秋風鬟霧鬢歸來晚忘却荷花記得愁建安遣興三首建安酒薄客愁濃除却哦詩事事慵不許今年頭不白城樓殘角寺樓鐘錦城重到歎無期忽憶書臺步月時白浪黏天蛟鰐橫夢中識路亦何為緑沉金鎖少時狂幾過秋風古戰場夢裏都忘閩嶠逺萬人鼓吹入平凉排悶絶句三首四十從軍渭水邉功名無命氣猶全白頭爛醉東吳市自拔長刀割彘肩西塞山前吹笛聲曲終已過洛陽城君能洗盡世間念何處樓臺無月明風霜九月冷颼颼湖海飄然一布裘親見虙羲欲畫卦轉頭三十萬春秋晚興一聲天邉斷鴈哀數蘂籬畔早梅開幽人耐冷倚門久送月墮湖歸去來欲出遇雨東風吹雨惱遊人滿路新泥換細塵花睡栁眠春自懶誰知我更懶於春示子聿絶句儒林早嵗竊虛名白首何曽負短檠堪歎一衰今至此夢回聞汝讀書聲初夏絶句紛紛紅紫已成塵布榖聲中夏令新夾路桑麻行不盡始知身是太平人小舟遊近村三首數家茅屋自成村地碓聲中晝掩門寒日欲沉蒼霧合人間隨處有桃源不識如何喚作愁東阡西陌且閒遊兒童共道先生醉折得黃花插滿頭斜陽古栁趙家莊負鼓盲翁正作場死後是非誰管得蒲村聽說蔡中郎一壺歌長安市上醉春風亂插繁花滿帽紅看盡人間興廢事不曾冨貴不曾窮觀梅至花徑高端叔解元見尋春暖山中雪作堆放翁艇子出尋梅不須問訊道傍叟但覔梅花多處來雜題二首其一松肪釀酒石根醉檞葉作衣雲外行指㸃人間一長歎秋風又到洛陽城其二黍醅新壓野雞肥茅店酣歌送落暉人道山僧最無事憐渠猶趂暮鐘歸雪中忽起從戎之興作二首其一狐裘卧載錦駝車酒醒氷髭結亂珠三尺馬鞭裝白玉雪中畫字草軍書其二十萬貔貅出羽林橫空殺氣結層隂桑乾沙土初飛雪未到幽州一丈深杖錫平老自都城回見訪索怡雲堂詩因賦三首其一東華軟塵飛撲帽黃金絡馬人看好渠儂胸中誰得知畏禍憂讒鬢先老其二舉世輸與平老行青山白雲過一生出門曵杖便千里白雲不約常同行其三敲門剝啄雲滿屨劇談未竟還東去到山分我一片雲并遣春風吹好句放翁詩選前集卷九
