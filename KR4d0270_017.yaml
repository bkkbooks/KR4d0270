body:
  text: 放翁詩選後集巻七宋羅椅撰七言四句籌筆驛有武侯祠運籌塵迹故依然想見旌旗駐道邊一等人間管城子不堪譙叟作降牋小雨極凉舟中熟睡至夕舟中一雨掃飛蠅半脱綸巾臥翠藤清夢初回牕日晚數聲柔櫓下巴陵冬夜聴雨戯作二首少年交友盡豪英妙理時時得細評老去同叅惟夜雨焚香臥聴畫簾聲遶檐㸃滴如琴筑支枕幽齋聴始竒憶在錦城歌吹海七年夜雨不曾知此老富貴有無奈着處又時時有識羞耳寺樓月夜醉中海山縹緲玉真妃貪看氷輪不肯歸樓上三更風露冷旋圍步障換羅衣此等亦非俗子能道觀華嚴閣僧齋拂劔當年氣吐虹喑嗚坐覺朔庭空早知壮士成癡絶悔不藏名萬衲中世間此句道盡可喜亦可恨讀書面骨峥嶸鬢欲疎退藏只合臥蝸廬自言尚有人間意射雉歸來夜讀書雜詠二首㣲風翻翻芋葉白落日漠漠稻花香出門縦轡何所惜萬里溪南追晚涼世事盛衰誰得知惠陵烟草掩柴扉陵邊人家樷竹裏燈火呼喧迎婦歸夜坐大風横吹斗柄折迅雷下擊山石裂放翁閉戸寂不聞楞嚴巻盡燈花結文君井落魄西川泥酒盃酒酣㡬度上琴臺青鞋自笑無拘束又向文君井畔來記夢烏巾白紵憶當年抵死尋君不自憐憔悴劔南雙鬢改夢中猶上暗門船江上尋梅小園風月不多寛一樹梅花開未殘剥啄敲門嫌特地緩拖横杖隔籬看看梅歸馬上本為梅花判獨飲却嗔梅花消宿酲日欲落時始上馬青羊宫前聞發更迎詔書憶瞻鸞仗省門前扇影鞭聲下九天寂寞嘉州迎詔處忽聞鼓吹却凄然見螢蜀州官居富水竹四月螢火遶梁飛流年迫人不相貸客子倦遊何日歸秋夜池上作短髪颼颼病骨輕臨池閑看露荷傾月明何與浮雲事正向圓時故故生好花時遍遊諸園為愛名花抵死狂只愁風日損紅芳緑章夜奏通明殿乞借春陰䕶海棠狂得有理又翩翩馬上㡌簷斜盡日尋春不到家偏愛張園好風景半天髙柳臥溪花花卧柳卧邪語自可畫春晚感事寒食梁州十萬家秋千蹴踘尚豪華犢車轣轆歸城晚争碾平蕪入亂花梅一花兩花春信回南枝北枝風日催爛熳却愁零落盡丁寧且莫十分開沈園城上斜陽畫角哀沈園非復舊池臺傷心橋下春波緑曾是驚鴻照影來又夢斷香消四十年沈園柳老不吹綿此身行作稽山土猶吊遺蹤一泫然白樂天詩倦倚繡床愁不動緩垂緑鬢髻鬟低遼陽春盡無消息夜合花開日又西好事者畫為倦繡圖此花以五六月間開山中人殊不貴之王室東遷歳月賖兩京漠漠暗塵沙繡床倦倚人何在風雨漫山夜合花鷺雪衣飛去莫匆匆小住灘頭伴釣蓬禹廟蘭亭三十里相逢多在暮烟中湖村月夕客路風塵化素衣閑愁冉冉鬢成絲平生不負月明處神女廟前聞竹枝軍中雜歌名王金冠玉蹀踒面縳纛下聲呱呱藁街未遽要汝首賣與酒家鉗作奴又漁陽女兒美如花春風樓上學琵琶如今便死知無恨不屬畨家屬漢家又北庭茫茫秋草枯正東萬里是皇都征人樓上看太白思婦城南迎紫姑無題碧玉當年未破𤓰學成歌舞入侯家如今憔悴篷牕底飛去青天妬落花看梅二首梅花樹下黄茆丘古人尚能愛花不月淡烟深横牧笛死生常事不須愁沉絶警絶荒陂十畆浴鳬鴨折葦枯蒲寒意深何處得船滿載酒醉時繫着古梅林次韻魯山新居短墻缺處插疎籬巷劣容車堂對陂天下有公殊可賀坐中着我不妨竒横姿自好宿楓橋七年未到楓橋寺客枕依然半夜鐘風日未須輕感慨巴山此去尚千重重陽照江丹葉一林霜折得黄花更斷腸商畧此時須痛飲細腰宫畔過重陽霽夜觀月雲重真愁無散時可憐不奈夜風吹殘暉如此那休得誰誤虚空作許癡
