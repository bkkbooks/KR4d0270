body:
  text: 放翁詩選後集卷六宋羅椅撰恩除祕書監羣仙鶴駕去難追白首重來不自知才藝荒唐癡獨絶功名蹭蹬老如期海邊鄭叟窮耽酒吳下韋郎晚學詩扶上木天君莫笑衰殘不似壯遊時醉中夜自村市歸村市夜騎黃犢還却登小閣倚闌干銀河斜界曉天碧璧月下入秋江寒吾輩身閒且飲酒人生事定須闔棺元自胸中著雲夢莫驚緑鬢奈悲歡病起山村病起帽圍寬春盡江南尚薄寒志士凄凉間處老名花零落雨中看斷香漠漠便支枕芳草離離獨倚䦨收拾吟箋停酒碗年來觸事動憂端臨安雨晴世味年來薄似紗誰令騎馬客京華小樓一夜聽春雨深巷明朝賣杏花矮紙斜行間作草晴窗細孔戲分茶素衣莫起風塵歎猶及清明可到家初寒船尾寒風不滿旗江邊叢祠常掩扉行人畏虎少晨出舟子捕魚多夜歸茅葉翻翻帶宿雨蘆花漠漠弄斜暉傷心到處聞砧杵九月今年未授衣馬上燈前薄飯陳鹽虀帶睡强出行江堤五更落月移樹影十月清霜侵馬蹄荒陂嗈嗈已度鴈小市喔喔初鳴雞可憐萬里覔歸夢未到故人先自送語語有氣黃州局促常悲類楚囚遷流還嘆學齊優江聲不盡英雄恨天地無私草木秋萬里羇愁添白髮一帆寒日過黃州好君看赤壁終陳迹生子何須萬戶侯哀郢荆州十月早梅春徂歲真同下坂輪天地何心窮壯士江湖從古著羇臣淋漓痛飲長亭暮慷慨悲歌白髮新欲弔章臺無處問廢城霜露濕荆榛水亭有懷漁舟把酒對丹楓水驛慿軒送去鴻來得是道路半年行不到江山萬里看無窮故人草詔九天上老子題詩三峽中上句太淺不爾又不得笑語毛錐可無恨書生處處與卿同江上江上霜寒透客衣間窗羸臥不支持羇孤形影真相弔衰颯頭顱已可知自在潦縮穩經行雨峽竹疏䞉見掛猿枝清尊可醉須勤醉莫望功名老大時聞猿瘦盡腰圍不為詩良辰流落自成悲也知客裏偏多感誰料天涯有所思漢塞角殘人不寐渭城歌罷客將離故應未抵聞猿恨況是巫山廟裏時南鄭馬上南鄭春殘信馬行通都氣象尚崢嶸迷空游絮慿陵去曳線飛鳶跋扈鳴落日斷雲唐闕廢淡烟芳草漢壇平猶嫌未豁胸中氣目斷南山天際橫夜抵葭萌惠照寺寓榻小閣亭驛驅馳髀肉消故山歸夢愈迢迢夜行觸尉那能避旦過逢僧不放招雨後風雲猶慘淡霜前草木已蕭條衰遲事事非前日醉裏題詩亦自聊篇篇自道歸次漢中境上雲棧屏山閲月游馬蹄初喜踏梁州地連秦雍川原壯水下荆揚日夜流遺虜孱孱寧逺略孤臣耿耿獨私憂良時恐作他時恨大散關頭又一秋赴成都泛舟自三泉至益昌謀以明年下三峽詩酒清狂二十年又摩病眼看西川心如老驥長千里身似春蠶已再眠暮雪烏奴停醉帽秋風白帝放歸船飄零自是關天命却被人呼作地仙七月一日夜坐舍北水涯兀傲胡床酒半醒釣筒收盡數舟橫風生細葛無三伏月上疏林正四更北斗離離低欲盡明河脉脉去無聲斥仙豈復塵中戀便擬騎鯨返玉京新秋感事江上清秋昨夜回漁扉正對荻洲開志存天下食不足節慕古人讒愈來風際紙鳶那解久祭餘芻狗會堪哀蕭然散髮聽秋雨剩領新凉入酒杯風雨中過龍洞閣飄然醉袖怒人扶箇裏何曾有畏塗寫得如此健卷地黑風吹慘淡半天朱閣插虛無闌邊歸鶴如爭捷雲表飛仙定可呼語壯莫怪衰翁心膽壯此身元是一枯株獨游城西諸僧舍我是天公度外人看山看水自由身蘚岩頂上飛雙屐雲洞前頭岸幅巾萬里欲呼牛渚月一生不受庾公塵非無好客堪招喚獨往飄然覺更真過野人家縱轡江臯送夕暉誰家井臼映荆扉隔籬犬吠窺人過滿箔蠶飢待葉歸世態千年看爛熟家山萬里夢依稀躬耕本是英雄事老死南陽未必非晚興老病愁趍畫㦸門天教髙臥浣花村山林獨往雜屠釣世界皆空誰怨恩千卷蠧書忘歲月一尊濁酒信乾坤興來倚杖清江上斷角殘鐘正斂昏隨意襯貼皆及本色芳華樓夜飲射虎將軍老不侯尚能豪縱醉江樓笙歌雜沓娛清夜風露髙寒接素秋少日壯心輕玉塞暮年幽夢墮滄洲人間清絶沅湘路常笑靈均如許愁秋思大面峯前秋笛清細腰宫畔暮灘平吳檣楚柂勒歸思隴月巴雲空復情萬里風塵舊朝士百年鉛槧老書生水村漁市從今始安得區區海內名月下黃鵠飛鳴未免飢此身自笑欲何之閉門種菜英雄老彈鋏思魚富貴遲生擬入山隨李廣死當穿冡近要離一樽強醉南樓月感慨長吟恐過悲書懷愁向東華踏軟紅暫歸舊隱樂無窮石池洗藥娟娟水漁艇投竿嫋嫋風盡日醉醒菱唱裏鄰家來往竹陰中何須列㦸長安第四望雲山擁此翁舜廟懷古雲斷蒼梧竟不歸江邊古廟鎖朱扉山川不為興亡改風月應憐感慨非孤枕有時鶯喚夢斜風無賴客添衣千年回首消磨盡輸與漁舟送落暉放翁詩選後集卷六
