body:
  text: 放翁詩選别集五言頃嵗從戎南鄭屢往來興鳯間暇日追憶有賦昔戍蠶叢北頻行鳯集南烽傳戎壘宻驛送客程貪春盡花猶拆雲低雨半含種畬多菽粟藝木雜松楠婦汲惟陶器民居半草庵風煙迷棧閣雷霆起湫潭城郭秦風近村虛蜀語參快心逢曠野刮目望浮嵐考古興時感無詩每自慚嘉陵最堪憶迎馬栁毿毿冬日感興十韻雨露天昏曀陂湖地阻深蔽空鴉作陣暗路棘成林有客風埃裏頻年老病侵夢魂來二豎相法欠三壬舊憤開孤劍新愁感㫁砧唐衢惟痛哭莊舄正悲吟瘦跨秋門馬寒生夜店衾但思全舊璧敢冀訪遺簮樓上蒼茫眼燈前破碎心長謡傾濁酒慷慨厭層隂書直舍壁道山西下路杳杳歴重廊地寂聞傳漏簾踈有斷香渠清水馬健屋老瓦松長欲出重欹枕無何覔故鄉致仕述懐彈冠紹興末解組慶元中灔澦危途過邯鄲幻境空閑傳相牛法醉喚闘雞翁衝雨歸來晚山花滿笠紅韋布還初服蓬蒿卧故廬所慙猶火食更恨未巢居叱叱驅黄犢行行跨白驢交親各强健不必問何如春晚雜興池面萍初紫墻頭杏已青攜兒撑小艇留客坐孤亭相法無侯骨生年直酒星正須遺萬事莫遣片時醒暮春二首季子黄金盡安仁白髪新無情五更雨便送一年春難續西樓夢空存北陌身海棠應似舊惆悵又成塵緑葉枝頭宻青蕪陌上深江山妨極目天地入孤吟身已雙蓬鬢家惟一素琴世情君莫説頭痛欲涔涔小舟遊西涇渡西江而歸小雨重三後餘寒百五前聊垂𤓰蔓水閑泛木蘭船雪暗梨千樹烟迷柳一川西岡夕陽路不到又經年初春雜興水長鷗初泛山寒茗未芽深林聞社皷落日照漁家渡逺呼船久橋傾取路斜客愁慵逺眺不是怯風沙中春偶書鄰曲祈蠶候陂塘浸種時春寒薪炭覺雨霽皷鐘知驢瘦衝泥怯魚驚食釣遲衰翁一味懶耕養愧吾兒北齋書志示兒輩初夏佳風日頽然坐北齋百年從落魄萬事忌安排鄉俗能尊老君恩許賜骸飢寒雖未免何足繫吾懐五月初作鄰舍舂新麥家人拾晚蠶推移逢夏五賦與嘆朝三遣日須棋局忘飢頼酒甔幽居有髙致多取未為貪梅市道中雨暗山陂路人喧北渡頭廟垣新畫馬村笛逺呼牛買飯諳争席迎潮競解舟平生苦吟處又送一年秋秋夜紀懐北斗垂蒼莽明河浮太清風林一葉下露草百蟲鳴病入新凉减詩從半睡成還思散闗路炬火驛前迎舍北揺落景物殊佳偶作五首今年冬候晚仲月始㣲霜野日明楓葉江風斷鴈行窮途多籍躪老景亦悲傷自笑詩情懶蕭然舊錦囊路擁新霜葉溪餘舊漲沙棲烏初滿樹歸鴨各知家世事元堪笑吾生固有涯南村聞酒熟試遣小童賖小聚鷗沙北横林蟹舍東船頭眠醉叟牛背立村童日落雲全碧霜餘葉半紅窮鱗與倦翼終勝在池籠屋角成金字溪流作穀紋斜通小橋路半掩夕陽門孤艇衝煙過踈鍾隔塢聞杜門非獨病實自厭紛紛草徑人稀到柴扉手自開林踈鴉小泊溪淺鷺頻來簷角除𤓰蔓墻隅斸芋魁東鄰膰肉至一笑舉新醅殘臘殘臘無多日吾生又一年林塘明夕照墟落淡春煙山色危欄角梅花綠酒邊歲時元自好老病獨凄然初寒獨居戱作開殻得紫栗帶葉摘黄柑獨卧維摩室誰同彌勒龕宗文杜子羙之子樹雞柵靈照龐居士之女挈蔬藍一段無生話燈籠自可談晨起晨起梳頭懶披衣立草堂霧昏全隠樹氣暖不成霜灘急回魚隊天低襯鴈行新春猶一月已覺日㣲長五皷不得眠起酌一杯復就枕棲冷雞聲咽窻深燭熖明流年容易過華髪等閑生濁挹連醅酒香槎帶葉橙殘骸付螻蟻汗簡更須名辛酉冬至今日日南至吾門方寂然家貧輕過節身老怯増年元註鄉俗謂喫盡至飯即添一歲畢祭皆扶拜分盤獨早眠惟應探春夢已繞鏡湖邊已酉元日夜雨解殘雪朝陽開積隂桃符呵筆寫椒酒過花斟巷柳揺風早街泥濺馬深行宫放朝賀共識慕堯心甲子元日飲罷屠酥酒真為八十翁本憂縁直死却喜坐詩窮米賤知無盗雲􅙨又主豐一簞那復慮嬉笑伴兒童清明氣候三吳異清明乃爾寒老增丘墓感貧苦道途難燕子家家入梨花樹樹殘一春回首盡懐抱若為寛上已殘年登八十佳日遇重三簾幕低垂燕房櫳起晚蠶名花紅滿舫美醖緑盈甔春事還如昨衰懐自不堪醉中作宦遊三十載舉步亦看人愛酒官長罵迎花丞相嗔湖山今入手風月始闗身少吐胷中氣從教白髪新雪中二首春晝雪如簁清羸病起時跡深驚虎過煙絶憫僧饑地凍萱牙短林深鳥哢遲西窻斜日晚呵手歛殘棋忽忽悲窮處悠悠感歳華暮雲如潑墨春雪不成花眼澁燈生暈詩成字半斜殘樽已傾盡試起問東家小雪夜卧風號野晨興雪擁籬未言能壓瘴要是欲催詩跨蹇雖堪喜呼舟似更竒元知剡溪路不减㶚橋時大雪月下至旦欲午始晴薄暮雪雲低清霄意慘悽方聽打窻急已報與堦齊踈箔穿飛蝶空庭聚戱猊新晴思訪客愁絶滿城泥夜中步月夜半不成寐起尋㣲月行風生驚葉墯露重覺荷傾兀兀酒中趣悠悠身後名興闌還掩戸坐待日東生題齋壁皥皥太平民堂堂大耋身乾坤一旅舍日月兩車輪蓑貴超三品蔬甘敵八珍明年真耄矣爛醉海棠春力墻輸公上藏書教子孫追遊屏裘馬宴集止雞豚寒士邀同學單門與議婚定知千載後猶以陸名村自述古井無由浪浮雲一掃空詩書修孔業塲圃嗣豳風懼在饑寒外憂形夢寐中吾年雖日逝猶冀有新功舊業還耕釣殘年逼老期筋骸衰後覺力量夢中知客約溪亭飲僧招竹院棊未為全省事終勝宦遊時屏跡歸休後頥生寂寞中忍貧辭半俸學古得全功西埭村醅釅東坡小彴通經行有佳趣稚子也能同書適老翁垂七十其實似童兒山菓啼呼覔鄉儺喜笑隨羣嬉累瓦塔獨立照盆池更挾殘書讀渾如上學時幽事日日營幽事時時有好懐雨園殘竹粉風砌落松釵伴蝶行花徑聽蛙傍水涯窮通了無謂不必更安排葺圃種樹書頻讀齊民術屢窺曾求竹醉日更問柳眠時盧橘初非橘蒲葵不是葵因而辨名物甘作老樊遲幽事幽事春來早晨興即啟閽掃梁迎燕子插楥護龍孫數日招賔友先期辦酒樽淋漓衣袖濕不管漬春痕北檻北檻近中堂縁堦物自芳晨清花拱露地僻蘚侵廊坐久時開巻吟餘或炷香終朝無客至一枕到羲皇遊山蕭鼓湖山路天教脫馽機蟬聲入古寺馬影渡荒陂樵唱時傾耳僧談亦觧頥偏門燈火閙不敢恨歸遲古寺不來久入門空嘆嗟僧亡惟見塔樹老已無花世事雖難料吾生固有涯殷勤一梳月十里伴還家巢山巢山避世紛身隠萬重雲半谷傳樵響中林過虎羣蟲􅦒葉成篆風蹙水生紋不踏溪橋月僊凡自此分短髪巢山客人知姓字誰穿林雙不借取水一軍持渴鹿群窺澗驚猿獨掛枝何曽蓄筆硯景物自成詩孤學孤學雖遺俗猶為一腐儒家貧占力量夜夢驗工夫正欲安三逕寧忘奏六符殘年知有幾自恠尚區區哭開孫學步漸扶床乗車已駕羊虛稱砌臺史不遇玉函方杳杳天難問茫茫夜正長寂寥誰伴汝蕭寺閉空房病中作破裘縫更暖糲食美無餘摩詰病說法虞卿窮著書身羸支枕久足蹇下堂踈今日晴窻好幽懐得細攄卧病雜題終日常辭客經年半在床愛窮留作伴諳病與相忘竈婢工烹粥園丁習寫方今朝有竒事久雨得窻光人間跛男子物外病維摩元註病中遂牽病右足但可妨趍拜何曾廢嘯歌菜羮酼醬薄村巷棘茨多舉手謝鄰父非君誰肯過病中示兒輩去去生方逺冥㝠死即休狂思攘鬼手危至服丹頭有劍知誰與無香可得留惟應勤孝謹事事鑑恬侯七言守嚴述懐桐君故隠兩經秋小院孤燈夜夜愁名酒過於求趙璧異書渾似借荆州溪山勝處身難到風月佳時興不休安得連雲車載釀金鞭重作浣花遊入城至郡圃及諸家園亭遊人甚盛老子何曾慣市塵今朝也復入城闉太平有象人人醉造物無私處處春九陌鶯花娛望眼一竿風月屬閑身不縁興盡回橈早要就湖波照角巾乍晴出遊八十山翁病不支出門也賦喜晴詩小樓酒斾闌街處深巷人家曬練時本借㣲風欹帽影却乗新暖弄鞭絲歸來幸有流香在剰伴兒童一笑嬉流香所賜酒名武林皇輿久駐武林宫汴洛當時未易同廣陌有風塵不起長河無凍水常通樓臺飛舞祥煙外皷吹喧呼明月中六十年間幾來往都人誰解記衰翁西村暮歸天氣清和修禊後土風淳古結繩前村村陂足分秧水戸戸門通入郭船亭帳盗消常息鼓㘯塲酒賤不論錢行人争看山翁醉頭枕槐根卧道邊入都葵莧登盤酒可賖豈知扶病又離家朝行打岸濤頭惡夜宿垂天斗柄斜不恨山林淹歲月但悲道路困風沙鄰翁好為看耕隴行矣東歸一笑譁上章納禄恩畀外祠遂以五月東歸身似霜松老不枯乞骸猶得侍清都百錢濁酒渾家醉六月飛蝱徹曉無美睡不愁閑客攪出遊自有小兒扶買山尚恐巢由笑敢向君王覔鏡湖黄紙淋漓字似鴉即今真箇是還家園廬漸近湖山好鄰曲來迎鼓笛譁籩實傍籬收豆莢盤蔬臨水採芹芽皇家養老非忘汝不必青門學種瓜羣玉峯頭孤夢斷五雲溪上野舟回傍人鷗鳥自然熟到處藕花無數開麥飯不饜猶面槁柴門閑閉自心灰雨來正作盆池地不怕冥冥半月梅身是風前一斷蓬經年竊食竟何功倚天青嶂迎船出撲馬紅塵轉眼空網戸餉魚勝丙宂旗亭送酒等郫筒死前幸作扶犂叟免使淮南笑發紅此身唯有一躬耕乞得餘年樂太平東觀並游驚昨夢西湖重到付來生一堤草露明晨照半浦荷香颭晚睛歴歴歸途皆勝事江亭先聽櫂歌聲七十七十殘年百念枯桑榆元不補東隅但存隠具金鴉觜那夢朝衣玉鹿盧身世蠶眠將作繭形容牛老已垂胡客來莫問先生處不釣娥江即鏡湖枕上作龍鍾七十豈前期矮㡌枯笻與老宜愁得酒巵如敵國病須書巻作良醫登山筋力雖尤健閉户工夫頗自竒今日快晴春睡足卧聽簷鵲已多時八十三吟石㠶山下白頭人八十三回見早春自愛安閑忘寂寞天將强健報清貧枯桐已㸑寧求識敝帚當捐却自珍桑苧家風君勿笑他年猶得作茶神戲遣老懐平生碌碌本無竒况是年垂九十時阿囝畧如郎罷意稚孫能伴太翁嬉花前騎竹强名馬堦下埋盆便作池一笑不妨閑過日歎衰憂死却成癡春近短褐枯笻老病身龍鍾也復喜新春已知不解多年住且作都無一事人簷角鳥聲呼醉夢室中花氣襲衣巾朝來更有欣然處一筋山蔬勝八珍睡起至園中春風忽已到天涯老子猶能領物華淺碧細傾家釀酒小紅初試手栽花野人易與輸肝肺俗話誰能掛齒牙更欲世間同省事勾回蟻戰放蜂衙立春日江花江水每年同春日春盤放手空天地無私生萬物山林有處着衰翁牛趍死地身無罪梅發京華信不通數片飛飛猶臘雪村鄰相喚賀年豐東籬東籬深僻嬾衣裳書巻縱横雜藥囊無吏徵租終日睡得錢沽酒一春狂新營茅舍軒窻静旋煑山蔬七筯香戲集句成圖素壁本來無事却成忙春夏之交風日清美欣然有感天遣殘年脱馽鞿功名不恨與心違綠陂細雨移秧罷朱舫斜陽擘紙歸花市丹青賣團扇象牙刀尺製單衣白頭曳杖人争看共歎浮生七十稀病足累日不出庵門折花自娛頻報園花照眼明蹣跚正廢下堂行擁衾又聽五更雨屈指元無三日晴不奈病何抛酒醆粗知春在頼鶯聲一枝自浸銅瓶水喜與年光未隔生春日小園雜賦久矣雲霄鍜羽翰小園聊得賦春寒風生鴨緑文如織露染猩紅色未乾不向山丘歎零落且從兒女話團欒人言麥信春來好湯餅今年慮已寛晚春感事少年騎馬入咸陽鶻似身輕蝶似狂蹴踘塲邊萬人看鞦韆旗下一春忙風光流轉渾如昨志氣低摧只自傷日永東齋淡無事閉門掃地獨焚香甲子立春前二日頭風初愈喜身輕書巻時開覺眼明養熟犬雞隨坐起性靈鳥鵲報隂晴韭菘飣餖春盤好芝术簁和臘藥成自笑衰殘殺風景燈前不擬入重城幽居初夏雨霽楸花練花照眼明幽人浴罷葛衣輕燕低去地不盈尺鵲喜傍簷時數聲對奕軒窻消永晝曬絲院落喜新晴忽驚重五無多日綵縷纒筒吊屈平初夏幽居虛堂一幅接䍦巾竹樹森踈夏令新缾竭重招麯道士床空新聘竹夫人寒龜不食猶能夀弊帚何施亦自珍枕簟北窻寧有厭小山終日尚嶙峋麥熟市米價减鄰里病者亦皆愈欣然有賦凶年已渡麥方秋學道從來幸寡求荷鍤自隨身若寄漉籬可賣飯何憂鄰翁瀕死復相見村市小凉時獨遊不怕歸時又侵夜新添畧彴跨清溝幽居初夏藤冠草屨病支離門外紛紛百不知解籜有聲驚倦枕飛花無力㸃清池閑思舊事唯求醉老感流年只自悲緑樹隂中紅練起一團零亂濕臙脂五月初夏病體輕偶書世事紛紛了不知又逢燕乳麥秋時經年謝客常因醉三日無詩自恠衰乗雨細移西崦藥留燈重覆北牕碁但將生死俱拈起造物從來是小兒夏日二首吳中五月暑猶㣲竟日南堂坐掩扉緑樹露香鶯獨語畫廊風惡燕雙歸三千界内人人錯七十年來念念非投老萬縁俱掃盡從今僧亦不須依梅雨初收景氣新太平阡陌樂閑身陂塘漫漫行秧馬門巷隂隂掛艾人白葛烏紗稱時節黄雞緑酒聚比鄰掀髯一笑吾真足不為無錐更歎貧秋雨初晴有感炎曦赫赫尚餘威冷雨蕭蕭故解圍號野百蟲如自訴辭柯萬葉竟安歸芼羮菰菜珍無價上釣魴魚健欲飛散吏何功霑一飽高眠仍聽搗秋衣林居秋日桔橰引水遶荒畦病卧蝸廬不厭低小聚數家秋靄裏平坡千頃夕陽西亭臯草木猶䓤蒨天上風雲已慘悽逋負如山炊米盡終年枉是把鋤犂秋晚書懐頽然兀兀復騰騰萬事惟除死未曾無奈喜歡閑弄水不勝頑健逺尋僧喚船野岸横斜渡問路雲山曲折登却笑吾兒多事在夜分未滅讀書燈舍北行飯書觸目落鴈昏鴉集逺洲青林紅樹擁平疇忽行舍北三叉路閑看橋西一片秋少婦破煙撑去艇了童横笛喚歸牛形容野景無餘思自恠癡頑不解愁冬晴日得閑遊偶作不用清歌素與蠻閑愁已自解連環閏年春近梅差早澤國風和雪尚慳詩思長橋蹇驢上棋聲流水古松間牋天有事君知否止乞柴荆到死閑冬晴閑步東村由故塘還舍紅藤拄杖獨相羊路遶東村小嶺傍水落枯萍黏蟹椵鄉人植竹以取蟹謂之蟹椵雲開寒日上魚梁洛陽二頃言良是光範三書計本狂歴盡危機識天道要今閑健返耕桑十二月八日步至西村臘月風和意已春時因散䇿過吾鄰草煙漠漠柴門裏牛跡重重野水濵多病所需惟藥物差科未動是閒人今朝佛粥更相餽更覺江村節物新夜雨蕭蕭殘髪雪侵冠冉冉清愁用底寛把巻昏眸常欲閉投床睡興却先闌惟須酒沃相如渴未分人哀范叔寒雨霽定知梅已動佩壺明日試尋看新年書感早歲西遊賦子虛暮年負耒返鄉閭殘軀未死敢忘國病眼欲盲猶愛書朋舊何勞記車笠子孫幸不廢菑畬新年冷落如常日白髪蕭蕭悶自梳人日雪病卧江村不厭深貂裘無奈曉寒侵非賢那畏蛇年至多難却愁人日隂嫋嫋孤雲生翠壁霏霏急雪灑青林一盂飯罷無餘事坐看生臺下凍禽秋雨剡曲髙秋一草亭雨來迨我醉初醒豪吞平野宜閑望亟打虛窻入静聽沙上濕雲號斷鴈籬根衰草綴孤螢老人嬾復親燈火卧看爐香掩素屏秋雨北榭作秋風吹雨到江濆小閣踈簾晚色分津吏報增三尺水山僧歸入萬重雲飄零露井無桐葉斷續煙汀有鴈羣了却文書早尋睡簷聲偏愛枕間聞春雨倚欄正爾愛斜陽細雨霏霏度野塘本為柳枝留淺色却教梅蕋洗幽香小沾蝶粉初何惜暫濕鶯身亦未妨造化無心能徧物慿誰閑與問東皇雨家近蓬萊白玉京草堂登望不勝清初驚野色昏昏至已見波紋細細生殘醉頓消迎亂㸃㣲吟漸覺入寒聲只愁今夕虛簷滴又對青燈夢不成小雨初霽歸來偶似老淵明消渴誰憐病長鄉小雨染成芳草色好風吹斷畫簷聲剪燈院落晨猶冷賣酒樓臺晚放晴莫道此翁逰興嬾蘭亭蕭寺已闗情小飲梅花下作脫巾莫嘆髪成絲六十年間萬首詩予自十七八學詩今六十年得萬篇排日醉過梅落後通霄吟到雪殘時偶容後死寧非幸自乞歸耕已恨遲青史滿前閑即讀幾人為我作蓍龜六日雲重有雪意獨酌遍遊藪澤一漁舠歴盡風霜只緼𫀆天為念貧偏與健人因見懶悞稱高地連海澨濤聲近雲冒山椒雪意豪偶得芳樽須痛飲凉州那得直蒲萄小圃獨酌少年裘馬競豪華豈料今為老圃家數㸃霏㣲社公雨兩叢閑淡女郎花詩成枕上常難記酒滿街頭却易賖自笑邇來能用短只將獨醉作生涯對酒老子不堪塵世勞且當痛飲讀離騷此身幸已免虎口有手但能持蟹螯牛角掛書何足問虎頭食肉亦非豪天寒欲與人同醉安得長江化濁醪醉中自贈富貴猶宜早退休一生齟齬更何求賦形未至欠壬甲語命寧須憎斗牛栗里牧身貧亦樂平陵埋骨死無憂狂歌醉舞真當勉剰折梅花插滿頭梅花家是江南友是蘭水邊月底怯新寒畫圖省識驚春早玉笛孤吹怨夜殘冷淡合教閑處着清癯難遣俗人看相逢剰作樽前恨索笑情懐老漸闌十一月八夜燈下對梅獨酌累日勞甚頗自慰也奔走人間無巳時夜窻喜對出塵姿移燈看影憐渠瘦掩户留香笑我癡冷豔照杯欺麴蘖孤標逼硯結氷澌本來難入繁華社莫向春風怨不知荀秀才送臘梅十枝竒甚為賦此詩與梅同譜又同時我為評香似更竒痛飲便拚千日醉清狂頓减十年衰色疑初割蜂脾蜜影欲平欺鶴膝枝插向寶壺猶未稱合將金屋貯幽姿樊江觀梅莫笑山翁老據鞍探梅今夕到江干半灘流水浸殘月一夜清霜催曉寒倚醉更教重秉燭怕愁元自怯慿欄誰知携客芳華日曾費纏頭錦百端梅花四首老厭紛紛漸鮮歡愛花聊復客江干月中欲與人争瘦雪後休慿笛訴寒野艇幽尋驚歲晚紗巾亂插醉更闌猶憐心事凄凉甚結子青青亦帶酸月地雲堦暗斷腸知心誰解賞孤芳相逢只恠影亦好歸去始知身染香渡口耐寒窺浄緑橋邊凝怨立昏黄與卿俱是江南客剰欲樽前說故鄉𤣥冥行令肅氷霜墻角踈梅特地芳屑玉定煩修月戸堆金難買破天荒了知一氣環無盡坐嘯千林凍欲僵力量世間難得似挽回歲律放春陽折得名花伴此翁詩情恰在醉䰟中髙標不合塵凡有尤物真窮造化功霧雨更知仙骨别鈆丹那悟色塵空前身姑射疑君是問道端須順下風漣漪亭賞梅判為梅花倒玉巵故山幽夢憶疎籬寫真妙絶横窻影徹骨清寒蘸水枝苦節雪中逢漢使高標澤畔見湘纍詩成怯為花拈出萬斛塵襟我自知射的山觀梅射的山前雨墊巾籬邊初見一枝新照溪盡洗驕春意倚竹真成絶代人餐玉元知非火食化衣應笑走京塵即今畫史無名手試把清詩當寫真凌厲氷霜節愈堅人間乃有此癯仙坐收國士無雙價獨出東皇太一前此去幽尋應盡日向來别恨動經年花中竟是誰流軰欲許芳蘭恐未然園中賞梅閲盡千葩萬卉春此花風味獨清真江邊曉雪愁欲語馬上夕陽香趁人慰眼紅苞初報信回頭青子又生仁覊遊偏覺年華速徙倚闌干一愴神行遍茫茫禹畫州尋梅到處得閑遊春前春後百回醉江北江南千里愁未愛繁枝壓紗㡌最怜亂㸃糝貂裘一寒可賀君知否又得幽香數日留梅若耶溪頭春意慳梅花獨秀愁空山逢時决非桃李軰得道自保氷雪顔仙去要令天下惜折來聊伴放翁閑人中商略誰堪比千載夷齊伯仲間雪瘴癘家家一洗無更欣餘潤沃焦枯花壺夜凍先除水衣焙朝寒久覆爐松頂積高時自墮竹枝壓重欲相扶雲開正值春風早却看晴光滿九衢作雪寒甚有賦雲瞑風號得我驚硯池轉盻已氷生窻間頓失踈梅影枕上空聞斷鴈聲公子皂貂方痛飲農家黄犢正深耕老人别有超然處一首新詩信筆成雪但苦祁寒恼病翁豈知上瑞報年豐一庭不掃待新月萬壑盡平號斷鴻繭紙欲書先硯凍羽觴纔舉已樽空若耶溪上梅千樹欠我今年繫短蓬平郊漫漫覺天低况復寒雲結慘悽老子方驚飛蛺蝶羣兒已説聚狻猊中宵猿墮頻摧木徹旦雞瘖重壓棲只待新晴梅塢去青鞵未怯踏春泥大雪大雪江南見未曽今年方始是嚴凝巧穿簾罅如相覔重壓林梢欲不勝氊幄擲盧忘夜睡金覊立馬怯晨興此生自笑功名晚空想黄河徹底氷雪中作竹折松僵鳥雀愁閉門我亦擁貂裘已忘作賦遊梁苑但憶衘枚入蔡州屬國飡氊真强項翰林煮茗自風流明朝日暖君須記更看青鴛玉半溝鬢毛無奈歲華催一笑登臨亦樂哉平地忽成三尺雪遶湖何啻萬株梅雲山疊疊朝慿閣簾幙沉沉夜舉杯節物鼎來方自此酥花綵勝待春回登東山老慣人間歲月催强扶衰病上崔嵬生為柱國細事耳死畫雲臺何有哉熟計提軍出青海未如喚客倒金罍明朝日出春風動更看青天萬里開題庵壁衰髪蕭疎雪滿巾君恩乞與自由身身并猿鶴為三口家托煙波作四鄰十日風號未成雪一年梅發又催春漁舟底用勤相覔本避浮名不避人山行過僧庵不入垣屋參差竹塢深舊題名處懶重尋茶爐煙起知髙興棊子聲踈識苦心淡日暉暉孤市散殘雲漠漠半川隂長吟未斷清愁起已見横林宿暮禽閒中書事病過新年逐日添清愁殘醉兩厭厭惜花萎去常遮日待燕歸來始下簾堂上清風生玉麈澗中寒溜滴銅蟾一生留滯君休嘆意望天公本自亷一畝山園半畝池流年忽逮掛冠期賣花醉叟剥紅桂種藥高僧寄玉芝午枕為兒哦舊句晚窻留客算殘棊登庸䇿免多新報老子癡頑總不知窮居半世倀倀信所之窮居仍抱暮年悲燒金術誤囊衣薄種黍年凶酒味醨大厦萬間空有志後車千乗更無期掩書常笑城南杜麻履還朝受拾遺西窻西牕偏受夕陽明好事能來慰此情看畫客無寒具手論書僧有折釵評薑宜山茗留閑啜豉下湖蓴喜共烹酒䏑朱門非我事諸君小住聽松聲耕罷偶書新溉東臯畝一鍾烏犍粗足事春農㶚橋風雪吟雖苦杜曲桑麻興本濃老大斷非金谷友生存惟冀酒泉封莫嘲野餉蕭條甚箭茁蓴絲亦且供小築小築湖邊避俗囂幾年於此寓簞瓢雖無隠士子午谷寧愧詩人丁卯橋羅雀門庭無俗駕縁雲磴路有歸樵詩情酒興常相屬堪笑傍人說寂寥過鄰家戲作久脫朝冠岸幅巾時時乗興過比鄰缾無儲粟吾猶樂步有新船子豈貧醅甕香浮花露熟藥欄土潤玉芝新相從覔笑真當勉又過浮生一歲春簡鄰里今年意味報君知屬疾雖頻未苦衰獨坐冷齋如自訟小鐫殘俸類分司閑撑野艇漁簔濕亂插山花醉㡌欹有興行歌便終日逢人那識我為誰戱詠閑適涉世心知百不能閉門懶出病相仍簞瓢味美如烹鼎鄰曲人淳佀結繩半顆鴉殘墻外杏一枝鵲褭澗邊藤蕭然掃盡彈冠興敢為詩情望武陵閑中頗自適戲書示客髪猶半黑臉常紅老健應無似放翁烹野八珍邀父老燒窮四和伴兒童剪紗新製簮花㡌乞竹寛編養鶴籠巢許䕫龍竟誰是請君下語勿匆匆幽居述事四首曾會蘭亭醉墮簮後身依舊住山隂琴傳數世漆文斷鶴養多年丹頂深滌硯灘頭無漬墨吹簫月下有遺音小詩戲述幽居事後有高人識此心頽然掩戸不妨竒又賦幽居第二詩大藥鼎成令虎守精思床穩用龜支壺中自喜乾坤别局上元知日月遲更就羣童閑闘草人間何處不兒嬉落葉平溝日滿廊幽居又賦第三章喜無俗事干靈府恨不終年住醉鄉上樹榜船雖老健䟽泉移竹亦窮忙山僧欲去還留話更盡西齋一炷香舴艋東歸喜遂初頓拈枯筆賦幽居細燒柏子供清坐明㸃松肪讀道書蒼爪嫩芽開露茗紅根小把瀹煙蔬年來自許機心盡頗恠飛鷗自作疎杜叔高秀才雨雪中相過留一宿而别口誦此詩以送之久客方知行路難闗山無際水漫漫風吹欲倒孤城逺雪落如簁野寺寒暮挈衣囊投上室晨沽村酒掛驢鞍文章一字無人識胷次徒勞萬巻蟠送陳懐叔赴上臯酒官却還都下竒才初試發硎刀疋馬秋風到上臯地近雖同三輔重時平無復五陵豪極知稳步煙霄路却要㣲知郡縣勞歸去平津首開燕吐茵應復忤西曹送任夷仲太監往者江淮未撤兵丹陽邂逅識耆英叩門偶綴諸公後倒屣曾䝉一笑迎敢意癡頑成後死相從髣髴若平生小詩話别初何有一段清愁伴艣聲書憤白髪蕭蕭卧澤中秪慿天地鑒孤忠阨窮蘇武餐氈久憂憤張巡嚼齒空細雨春蕪上林苑頽垣夜月洛陽宫壯心未與年俱老死去猶能作鬼雄鏡裏流年兩鬢殘寸心自許尚如丹衰遲罷試戎衣窄悲憤猶争寶劍寒逺戍十年臨滴博壯圖萬里戰臯蘭闗河自古無窮事誰料如今袖手看贈童道人蓋與予同甲子吾儕之生乙巳年達者寥寥同比肩退士一生藜藿食散人萬里江湖天忍貧不變我自許挾術自營君豈然一事尚須煩布策幾時能具釣魚船贈徐相師許負遺書果是非子慿何處說精微使君豈必如椰大丞相元來要瓠肥袖闊日常籠短刺肩寒春未換單衣半頭布袋挑詩巻也道游京賣術歸贈傅神水鑑寫照今誰下筆親喜君分得卧雲身口中無齒難藏老頰上加毛自有神誤遣汗青成國史未妨着句號山人他時更欲求竒迹畫我溪頭把釣緍後寓嘆貂蟬未必出兠鍪要是蒼鷹已下韝彭澤竟歸端為酒輕車已老豈須侯千年精衛心平海三日於菟氣食牛會與高人期物外摩挲銅狄㶚陵秋初歸雜詠雪滿漁簔雨墊巾超然無處不清真胸中那可有一事天下故應無兩人騎馬每行秋棧路喚船還渡暮江津酒樓僧壁留詩遍八十年來自在身齒豁頭童儘耐嘲即今爛飯用匙抄朱門謾設千杯酒青壁寧無一把茅偶爾作官羞問馬頽然對客但稱猫此時定向山中死不用磨錢擲卦爻龜堂獨坐遣悶放逐還山入見春枯顱槁頂雪霜新大床不解除豪氣凡眼安能識貴人食有淖糜猶足飽衣存短褐未全貧北牕坐卧君無笑拈起烏藤㨗有神遣興莫笑龜堂磊磈胷此中元可貯虚空尚饒靈運先成佛那計辛毗不作公采藥偶逢丹井客買蓑因過玉霄翁不須更問歸何許散髪飄然萬里風書興占得溪山卜数椽飽經世故氣猶全入門明月真堪友滿榻清風不用錢便死也勝千百輩少留更望二三年湖橋酒美能來醉一棹何妨作水仙書齋壁平生憂患苦縈纒菱刺磨成芡實圓天下不知誰竟是古來唯有醉差賢過堂未悟鍾將釁睨柱誰知壁偶全自笑為農行沒世尚如驚雁落空絃遣興侯印從來非所圖赤丁子亦不容呼着低怯對新棊敵量减愁添舊酒徒生世豈能常役役酣歌且復和嗚嗚扁舟到處皆吾境莫問桐江與鏡湖家住城南剡曲傍門前山色蘸湖光三朝執㦸悲年壯二頃扶犁樂歲穰名姓已隨身共隠文辭終與道相忘子孫勉守東臯業小甑吳粳底様香雜興散髪林間萬事輕夢魂安穏氣和平只知秋菊有佳色那問荒雞非惡聲達士招呼同嘯傲福人分付與功名一篇説盡逍遥理始信蒙莊是達生嚴州贈姜梅山故人玉骨已生苔謂南澗公晚與君遊亦樂哉湖寺繫舟無夢去京塵馳騎有詩來醉中不敢教兒誦看處常須盥手開彈壓風光須健筆相期力斡萬鈞回寄姜梅山雷字詩章臺官柳映宫槐寶馬蹄輕不動埃只恠好詩無與敵誰知古學有從來江山常逐客帆逺歲月不禁衙鼓催剰約東鄰投净社高情千載有宗雷病愈倦榻呻吟每自哀占蓍來吉出餘災自能洗硯拂書几時亦折花尋酒盃久類寒蛟潜岫穴忽如老馬噴風埃霜晴爛熳東牕日一笑山坡訪早梅小疾兩日而愈病骨羸然山澤臞故應行路笑形模記書身大似椰子忍事癭生有瓠壺美酒得錢猶可致高人折簡孰能呼不如净掃茅齋地臨看㣲香起瓦爐陳阜卿先生為兩浙轉運司考試官時秦丞相之孫以右文殿修撰來就試直欲首選阜卿得予文巻擢置第一秦氏大怒予明年既顯黜先生亦幾䧟危機偶秦公薨遂已予晚歲料理故書得先生手帖追感平昔作長句以識其事不知衰涕之集也冀比當年浩莫分斯人一顧每空羣國家科第與風漢天下英雄唯使君後進何人知大老横流無地寄斯文自憐衰鈍辜真賞猶竊虛名海内聞雪夜感舊江月亭前撶燭香龍門閣上䭾聲長亂山古驛經三折小市孤城宿兩當晚歲猶思事鞍馬當時那信老耕桑綠沉金鏁俱塵委雪灑寒燈淚數行憶昔憶昔從戎出渭濵壺漿馬首泣遺民夜棲高冡占星象晝上巢車望塞塵共道功名方迫逐豈知老病只逡巡燈前撫巻空流涕何限人間失意人夢蜀夢飲成都好事家新粧執樂鴈行斜赭肩郫縣千筒酒照眼彭州百䭾花醉㡌傾欹歌未闋罸觥㶑灧笑方譁霜鍾喚覺晨􅙘白自恠無端一念差湖上遇道翁乃峽中舊所識也大罵長歌儘放顛時時一語却超然掃空百局無棊敵倒盡千鍾是酒仙巴峽相逢如昨日山隂重見亦前縁細思合辱先生友五十年來不負天贈道流煙雲深處作生涯回首人間歲月賖留得朱顔慿緑酒掃空白髪頼丹砂七絃指下冷冷久雙袖風中獵獵斜他日相尋不知處㑹從漁父問桃花放翁詩選别集
