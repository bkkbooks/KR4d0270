body:
  text: 放翁詩選後集卷八宋羅椅撰七言四句仙魚鋪得仲高書病酒今朝載臥輿秋雲漠漠雨踈踈閬州城北鮮魚鋪忽得山隂萬里書追憶征西幕中事憶昨王師戌隴回遺民日夜望行臺不論夾道壺漿滿洛笋河魴次第來夢中作大慶橋頭春雨晴行人馬上聽鶯聲祥符西祀曾迎駕惆悵無人說太平天竺曉行三茆聽徹五更鐘三竺穿窮九里松無復官樓沽美酒但煩湖水照衰容示兒老去元知萬事空但悲不見九州同王師北定中原日家祭毋忘告乃翁吳娃曲友有妾而內不容戲為作此因得不去滿地花陰不閉門琵琶抱恨立黃昏妾身不似天邊月此夜此時重見君又忘憂石榴深淺紅草花紅紫亦成叢明年開時不望見只望郎君說著儂又二月鏡湖水拍天禹王廟下鬪龍船龍船年年相似好人自今年異去年又臂上燒香拜佛前願郎安穩過新年多情已是長多病莫要留心在妾邊過江至蕭山縣驛東軒海棠已謝星星兩鬢怯年華幽館無人江月斜惆悵過江遲一夕曉風吹盡海棠花感舊南市夜夜上元燈西郊日日是清明青氊犢車碾花去黃金馬鞭穿柳行又半紅半白官池蓮半醒半醉女郎船鴛鴦驚起何曽管折得雙頭喜欲顛又美人傳酒清夜䦨欲歌未歌愁滿山蒲萄一斗元無價換得梁州也是閒過杜浦橋橋外波如鴨頭緑杯中酒作鵝貌黃山茶花下醉初醒却過西村看夕陽舟中感懷呈太傅相公兼簡嶽大用郎中雨打孤篷酒漸消昏燈與我共無聊功名本是無慿事不及寒江日兩潮又夢筆亭邊擁鼻吟壯圖蹭蹬老侵尋不眠數盡雞三唱自笑當年起舞心飲張功父園戲題扇上寒食清明數日中西園春事又匆匆梅花自避新桃李不為髙樓一笛風春晚一百五日春郊行三十六溪春水生千秋觀裏逢急雨射的峯前看晚晴即事組繡紛紛衛女工詩家於此欲途窮語君白日飛升法正在焚香聽雨中園中梅花重壓帽簷偏曳杖行歌意欲仙後五百年君記取斷無人似放翁顛冬夜聞角聲嫋嫋清笳入雪雲白頭老守卧中軍自憐到老懷遺恨不向居延塞外聞何家客亭梅子生仁燕護雛繞簷新葉緑踈踈朝來酒興不可奈買到釣船雙鱖魚荔枝樓小酌病與愁兼怯酒船巴歌聞罷更凄然此身未死長為客回首䕫州又二年老君洞明皇幸蜀見老君於此丹鳯樓頭語未終崎嶇蜀道更相逢太清宫闕俱煨燼豈亦南來避賊鋒仙遊閣張公一去二百載傑閣依然橫靄中徙倚看碑仍看畫時聞柏子落秋風采蓮蘸水朱扉不上關采蓮小舫夜深還一尊何處無風月自是人生苦缺間五言八句舟上夜坐風露浩無際星河淡欲傾遙知並船客聞我詠詩聲水鳥橫江去漁舟背月行神清不成寐隱几待窗明欲行雨未止幽幔依燈影空階送雨聲暫歸仍客路投老倍鄉情眼澀書難讀心搖夢易驚病多猶怕醉酒盡却思傾池亭夜坐池上小亭幽清宵秉燭遊荷盤時瀉露螢草早知秋有感歲時速無聲河漢流五字甚氣魄殊方不堪住歸夢繞滄洲小舟過吉澤效王右丞澤國霜露晚孤村烟火微本去官道逺自然人迹稀木落山盡出鐘鳴僧獨歸漁家間似我未夕掩柴扉雪霽過千秋觀縱轡不嫌逺逢山猶一登夕陽陂渺渺殘雪塔層層折竹橫遮道饑烏下啄氷欲歸還小駐倚杖對崚嶒晨起小雨濕清曉新鶯啼早春年光驚病眼節物屬間身巴峽東連海嶓山北控秦逺遊端可繼敢恨素衣塵幽居早歲猶竒怪中年痛掃除華堂棋陸廢名馬宴游踈散帙身忘倦畦蔬手自鋤寥寥千載後誰此訪幽居聞角小閣柴門近黃昏畫角聲時時逐風散嫋嫋伴愁生天地清秋暮關河殘月明湖南賊未破獨立久含情寄楊濟伯聞道皇華使來從萬里回五溪春薺老三峽暮猿哀昔日文昌省頻年灧澦堆問君何地險斟酌寄聲來小雨細細濕春光霏霏破夕陽卧聞驚倦枕起看入虛堂映葉鶯猶囀爭泥燕正忙閒愁無遣處誰與共飛觴寄張真人父舍人諸公方衮衮無地著斯人萬里䕫州守中朝禁省臣孤帆秋上峽五馬曉行春想見懷明主登臨白髮新送仲高兄宫學秩滿赴行在兄去游東閣才堪直北扉莫憂持槖晚姑記乞身歸道義無今古功名有是非臨分出苦語不敢計從違道義功名固是名言結得諄至更好他集少見夜夢從數客雨中載酒出遊之長安有酒不謀州能詩自勝侯但須繩繫日安用地埋憂射雉侵星出看花秉燭遊殘年杜陵客不恨濕貂裘統分稻晚歸薄酒不自酌夕陽須汝歸菊花霜後美豆莢雨中肥路逺應加飯天寒莫减衣老懷憂日切道眼看皆非題江陵村店壁青斾三家市黃茆十里岡蓬飛風浩浩塵起日茫茫馳騁多從獸鉏耰少破荒行人相指示此路走襄陽移船沙際舟銜尾相依作四鄰莫年多慷慨萬里亦悲辛容易吐得徹折竹占行日吹簫賽水神無勞問亭驛久客自知津鹿門關過龎士元祠士元死千載凄惻過遺祠海內常難合天心豈易知英雄今古恨父老歲時思蒼蘚無情極秋來滿斷碑此四句多少凄惻上元前一日異縣客游久今年春事遲峭寒增酒價微雨惱燈期看此老下字老態人未覺孤愁心自知停車呼病婦强出伴諸兒五言四句早梅東塢梅初動香來托意深明知在籬外行到却難尋病中半年不讀書顧影疑非我乃知百年中如此過亦可採菊秋花莫插鬢雖好亦凄凉採菊還挼却空餘滿袖香放翁詩選後集卷八
