  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0270_WYG_004-1a, image: WYG1163/WYG1163-0742c.png}
body:
  text: 放翁詩選前集卷四宋羅椅編七言八句栁林酒家小樓桃花如燒酒如油緩轡郊原常自遊微倦放教成午夢宿酲留得伴春愁逺塗始悟乾坤大晚節偏驚嵗月遒記取清明果州路半天高栁出青樓上虞逆旅見舊題嵗月感懷舴艋為家東復西今朝破曉下前溪青山缺處日初上孤店開時鶯亂啼倦枕不成千里夢壞墻間覔十年題漆園傲吏猶非逹物我區區豈足齊晝卧秋暑侵人氣力微燒香高枕掩柴扉弄姿野樹晴猶斂作態江雲晚未歸身外極知皆夢事世間隨處有危機故山松菊今何似晚矣淵明悟昨非醉歸持酒江頭到夕霏愁城頓覺解重圍澄波宜月移船看醉面便風走馬歸未路已驚添白髮故人頻報上黃扉強隨宦薄成真懶乞我吳松舊釣磯自上清延慶歸丈人觀留玉華樓再到蓬萊路欲平却吹長笛過青城空山霜葉無行迹半嶺天風有嘯聲細棧跨雲縈峭絶危樓飛柱插澄清玉華更控青鸞住要倚闌干待月明躬耕莫笑躬耕老蜀山也勝菜把仰園官喚回癡夢塵機息空盡間愁酒地㝟無復短衣隨李廣但思微雨過蘇端十年世事茫如海輸與間人靜處看留題雲門草堂小住初為旬月期二年留滯未應非尋碑野寺雲生屨送客溪橋雪滿衣親滌硯池餘墨漬卧看爐面散煙霏他年遊宦應無此早買漁蓑未老歸望江道中吾道非耶來曠野江濤如此去何之起隨烏鵲初翻後宿及牛羊欲下時風力漸添帆力健櫓聲常雜鴈聲悲晚來又入淮南路紅樹青山合有詩僧房假榻過盡青山喚渡船晚窗洗腳卧僧氊剩償平日清遊願更結來生熟睡緣吞啄漸稀如老鶴鳴聲已斷似寒蟬旁觀莫苦嘲癡頓此妙吾宗祕不傳晚晴聞角有感暑雨初收白帝城小荷新竹夕陽明十年塵土青衫色萬里江山畫角聲零落親朋勞逺夢淒涼鄉社負歸耕議郎博士多新奏誰致當時魯二生十四日宿東林寺看盡江湖千萬峯不嫌雲夢芥吾胸戲招西塞山前月來聽東林寺裏鐘逺客豈知今再到老僧能記昔相逢虛窗熟睡誰驚覺野碓無人夜自舂金陵先寄獻劉留守梁益羇遊道阻長見公便覺意差強别都王氣半空紫大將牙旗三丈黃江面水軍飛海鶻帳前羽箭射天狼歸來要了浯溪頌莫笑狂生老更狂夢至成都悵然有作春風小陌錦城西翠箔珠簾客意迷下盡牙籌間縱博刻殘畫燭戲分題紫氍毹暖帳中醉紅叱撥驕花外嘶孤夢淒涼身萬里令人憎殺五更雞又宦途元不羡飛騰錦里豪華壓五陵紅袖引行遊玉局華燈圍坐醉金繩階前汗血洮河馬架上霜毛海國鷹世事轉頭誰料得一官南去冷如氷書感溪路人家尚闔扉強扶衰憊著征衣百年朝露古所歎一棹秋風吾欲歸楚客長號沽白璧漢宮太息遣明妃鑠金銷骨從來事老矣何心踐駭機雪中懷成都憶在西州遇雪時繡筵處處百花圍烏絲闌展新詩就油壁車迎小獵歸感事鏡鸞悲獨舞寄書筝鴈恨慵飛愁多自是難成醉不為天寒酒力微西村醉歸俠氣崢嶸蓋九州一生常耻為身謀酒寧剩欠尋常債劒不虛施細碎讎岐路凋零白羽箭風霜破弊黑貂裘佯狂自是英豪事村市歸來醉跨牛贈林使君使君物外閲年華厭聽奴兵早暮衙雙屨踏雲呼野渡一瓢邀月醉梅花紅爐點汞間銷日烏几翻經不憶家我亦岷山有歸處約君同載泝三巴又松檜隂中百步廊我來剝啄叩琳房魚腸寶劒餘蛟血鴉觜金鋤帶藥香弱水蓬萊風浩浩赤明龍漢劫茫茫何妨付與神丹訣教跨青鸞入帝鄉遣興壯年一箭落雙雕野餉如今擷藥苖寒與梅花同不睡悶尋鸚鵡説無憀烏絲闌上詩初就緑綺聲中酒半銷老去可憐風味在未應山海混漁樵冬晚山房書事山澤何妨老太平巉巉骨相本來清月明滿地看梅影露下隔溪聞鶴聲未辨藥苖逢客問欲酬琴價約僧評半生壯志今俱淡且學湘纍拾菊英屏迹山村病日增烏皮几穩得間憑凍雲傍水封梅萼嫩日烘窗釋硯氷歲盡光隂饒衮衮身間醉夢且騰騰蠻童採藥歸來晚客至從嗔喚不譍得趙若川書因寄澤居路絶人不到晨起忽傳雙鯉魚儲淚一升悲世事減愁三尺看君書龍墀對䇿言傷直山邑迎親計未踈老病閉門誰省録因風時肯問何如夜歸醉中作意薄楊修喚小兒孤舟自笑髮成絲放開癡腹無非夢拈起幽懷總是詩霜下忽驚桐葉盡灘生更覺水聲竒餘年那恨驅黃犢除却為農百不冝早秋落魄巴山號放翁斯名嵗晚亦成空酒醒遙夜孤舟雨睡美清秋一榻風駭浪千重無死地神丹九轉有新功雲端不遇飛仙過誰顧幽人寂寞中郊行夜歸書觸目老翁病起厭端居隨意東西不問途霜野草枯鷹欲下江天雲濕鴈相呼空垣破竈逃租屋青幔紅燈賣酒爐未畏還家踏泥潦園丁持炬小兒扶初夏幽居昔如轉戰墮重圍今幸騫翔脫駭機曉樹好風鶯獨語夜窗細雨燕相依安居不恨蝸廬迮得食寧論鶴料微更喜暮年強健在又看刀尺製縑衣放翁詩選前集卷四
