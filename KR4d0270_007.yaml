  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0270_WYG_007-1a, image: WYG1163/WYG1163-0753a.png}
body:
  text: 放翁詩選前集卷七宋羅椅編七言八句初春遣興三首始於志退休而終於惓惓許國亦臣子大義也爛熟思來怕熱官退飛心地喜輕安捨魚正可取熊掌食肉何須至馬肝放眼栁梢初暗動褪花梅子已微酸典衣剩作江頭醉莫謂天涯苦鮮歡大隱悠悠未棄官俸錢雖薄却心安人方得意矜蝸角天豈使豫為鼠肝暇日劇棊忘旅恨短衣馳射壓儒酸小桃楊栁爭時節載酒江頭罄一歡白髮凄涼故史官十年身不到長安即今天末吊形影何日上前傾肺肝孤憤書成詞激烈五噫歌罷意辛酸此懷欲説無人共安得相携素所歡幽居書事莫恨人間苦不諧清時有味是歸來已因積毁成髙卧更借佯狂護散才正欲清言聞客至偶思小飲報花開紛紛爭奪成何事白骨生苔但可哀憶昔憶昔西遊變姓名獵圍屠肆狎豪英淋漓縱酒滄溟窄慷慨狂歌華嶽傾壯士有心悲老大窮人無路近功名生涯自笑惟詩在旋種芭蕉聽雨聲春晴暄甚遊西市遊家園稅駕名園半日留遊絲飛蝶兩悠悠驟暄不為海棠計長晝只添鸚鵡愁老去自驚詩酒減客中偏覺嵗時遒東風好為吹歸夢著我松江㺯釣舟二月二十四日作棠梨花開社酒濃南村北村鼓鼕鼕且祈麥熟得飽飯敢説榖賤復傷農崖州萬里竄酷吏湖南幾時起卧龍但願諸賢集廊廟書生窮死勝侯封出縣匆匆簿領不堪論出宿聊寬久客魂稻隴牛行泥滑滑野塘橋壞雨昏昏槿籬護藥才通徑竹筧通泉自遍村歸計未成留亦好愁腸不用繞吳門晨起偶題城逺不聞長短更上方鐘鼓自分明幽居不負秋來睡末路偏諳世上情大事豈堪重破壞窮人難與共功名風爐歙鉢生涯在且試新寒芋糝羮寒食臨川道中百卉千花了不存墮溪飛絮看無痕家人自作清明節老子來穿緑暗村日暮啼鴉隨野祭雨餘荒蔓上頽垣道邊醉飽休相避作吏堪羞甚乞墦初夏道中桑間椹熟麥齊腰鶯語惺愡野雉嬌日薄人家曬蠶子雨餘山客賣魚苖豐年隨處俱堪樂行路終然不自聊獨喜此身強健在又搖團扇著絺蕉春隂春風浩蕩作春隂弱燕歸來不自禁白塔昏昏才半露青山淡淡欲平沉裘茸細雨初驚濕屐齒新泥忽已深直怕樓髙生客恨不因病起倦登臨雨中泊趙屯歸燕羇鴻共斷魂荻花楓葉泊孤村風吹暗浪重添纜雨送新寒半掩門漁市人煙橫慘淡龍祠簫鼓閙黃昏此身且健無餘恨行路雖難莫更論大寒出江陵西門平明羸馬出西門淡日寒雲互吐吞醉靣衝風驚易醒重裘藏手取微溫紛紛狐兔投深莽點點牛羊散逺村不為山川多慷慨嵗窮遊子自銷魂過廣安弔張才叔諫議春風匹馬過孤城欲弔先賢淚已傾許國肺肝知激烈照人眉宇尚崢嶸中原成敗寧非數後日忠邪自有評歎息知人真未易流芳遺臭盡書生宿武連縣驛平日功名浪自期頭顱到此不難知宦情薄似秋蟬翼鄉思多於春繭絲野店風霜趣裝早縣橋燈火下程遲寒鞭尉手戎衣窄忽憶南山射虎時即事渭水岐山不出兵却携琴劔錦官城醉來身外窮通小老去人間毁譽輕捫蝨豪雄空自許屠龍工巧竟何成雅聞崏下多區芋聊試寒爐玉糝羮羅漢驛翠望亭讀宋景文公詩撲馬征塵拂不開髙亭欹帽一徘徊蜀山地暖稀逢雪閏嵗春遲未見梅陂水近人無鷺下煙村藏寺有鐘來宋公出牧曽題壁錦段雖殘試剪裁成都嵗暮始微寒小酌遣興革帶頻移紗帽寬茶鐺欲熟篆香殘踈梅已報先春信小雨初成十月寒身似野僧猶有髮門如村舍強名官鼠肝蟲臂尤無擇遇酒猶能罄一歡快晴地闢天開斗柄回今朝紅日遍池臺新陽蘇醒春前栁輕暖醫治雪後梅瓦屋螺青披霧出錦江鴨緑抱山來衰翁也逐兒童喜旋撥文書近酒杯暮春忙裏偷間慰晚途春來日日在東湖憑欄投飯看魚隊挾彈驚鴉護雀雛俗態似爭花爛漫病身能鬪竹清癯一樽是處成幽賞風月隨人不用呼東湖新竹插棘編籬謹護持養成寒碧映淪漪清風掠地秋先到赤日行天午不知解蘀時聞聲簌簌放梢初見影離離官間我欲頻來此枕簟仍教到處隨夏日湖上烏帽笻枝散客愁不妨胥吏雜沙鷗迎風枕簟平欺暑近水簾櫳預借秋茶竈逺從林下見釣筒常向月中收江湖四十餘年夢豈信人間有蜀州寓驛舍間坊古驛掩朱扉又憩空堂浣客衣九萬里中鯤自化一千年外鶴仍歸繞庭數竹饒新筍解帶量松長舊圍惟有壁間詩句在暗塵殘墨兩依依敇牟鎮早行孤燈照影聽初雞攬轡情懷倍慘凄雪作未成雲意閙茅荒無際客魂迷觸寒手指藏猶裂畏險圖書棄不携老去有文無賣處等間題遍蜀東西寓舍書懷借得茅齋近筰橋羇懷病思兩無聊春從豆䓻梢頭老日向樗蒲齒上消叢竹曉兼風力橫髙梧夜挾雨聲驕書生莫倚身常健未畫凌煙鬢已凋成都書事劒南山水盡清暉濯錦江邊天下稀煙栁不遮樓閣斷風花時逐馬頭飛芼羮筍似稽山美斫鱠魚如笠澤肥客報城西有園賣老夫白首欲忘歸午睡至暮酒力醺然入四肢華胥稅駕不應遲殘年已覺衰難強萬事無如睡不知幸有琴書供枕藉安能冠帶更支持紅爐過盡灰如雪獨守青燈坐畫詩夜宴酒浪搖春不受寒燭花垂燼忽堆盤山川路邈人將老絲管聲遒夜向闌四海交遊更聚散百年光景雜悲歡自憐病眼猶明在更把名花半醉看寄二子大兒新作鶴林遊仲子經年戍吉州日日望書常至暮時時入夢却添愁得官本自輕齊虜對景寧當似楚囚識取乃翁行履處一生任運笑人謀放翁詩選前集卷七
