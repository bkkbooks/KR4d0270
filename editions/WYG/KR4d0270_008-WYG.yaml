  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0270_WYG_008-1a, image: WYG1163/WYG1163-0757a.png}
body:
  text: 放翁詩選前集巻八宋羅椅編七言八句行武擔西南村落有感騎馬悠然欲斷魂春愁滿眼與誰論市朝遷變歸蕪没磵谷􅞛呀互吐呑一徑松楠遥見寺數家雞犬自成村最憐髙塚臨官道細細煙莎遍燒痕獨飲醉卧覺而夜半澤畔元非慕獨醒散人一飲費經營也知世少蘇司業安得官如阮步兵醉著靣顔驚少壯澆餘胷次失峥嶸更䦨莫厭殘燈火卧聴空廊絡緯聲城東馬上作割雞藉草醉春醪仰㸔鳴鵰百尺髙杜老何妨希稷卨孔明本自陋袁曹邊頭挿羽無傳檄篋裏盤鷴有舊袍寄語長安衆年少妓圍不似獵圍豪晩步江上萬里橋邉帶夕陽隔江漁市似清湘山林獨往吾何恨車馬交流渠自忙髙栁隂中扶拄杖平沙穏處據胡床故人京國無消息安得相携共此凉南定樓遇急雨行遍梁州到益州今年又作渡瀘遊江山重複争供眼風雨縱横亂入樓人語侏離逢洞獠棹歌欵乃下漁舟天涯住穏歸心懶登覧茫然却欲愁涪州古壘西偏曉繫舟倚䦨搔首思悠悠欲營丹竈竟無地不見荔枝空逺遊官道近江多亂石人家避水半危樓使君不用勤留客瘴雨蠻煙我欲愁黄鶴樓手把仙人緑玉枝吾行忽及早秋期蒼龍闕角歸何晚黄鶴樓中醉不知江漢交流波渺渺晉唐遺迹草離離平生最喜聴長笛裂石穿雲何處吹吾廬吾廬雖小亦佳哉新作柴門斸綠苔拄杖每攔歸鶴入鈞船時帶夕陽來墟煙隔水霏霏合籬菊凌霜續續開千里安期那可得笑呼鄰父共傳杯别建安小雨初收雲未歸吾行迨及晚秋時寒沙新鴈無人問露井殘桐有客悲征􅃑拂霜晨喚馬驛牕剪燭夜題詩悠然且作尋山想夢裏功名莫自期登擬峴臺層臺縹緲壓城闉倚杖來觀浩蕩春放盡尊前千里目洗空衣上十年塵瀠洄水抱中和氣平逺山如醖藉人更喜機心無復在沙邉鷗鷺亦相親初寒有感横林吹葉水生洲身落窮山古睦州到枕雨聲醒客夢背牕燈影動清愁氣衝牛斗有孤劔力挽棟梁無萬牛未滅匈奴身已老此生虚負幄中籌縱筆東都宫闕鬰嵯峨忍聴闗山敕勒歌雲隔江淮翔翠鳯露沾荆棘没銅駝丹心自笑依然在白髪將如老矣何安得鐡衣三萬騎為君王取舊闗河官居萬里飄然似斷蓬桐廬江上又秋風判餘牘尾棲鴉濕衙退庭中立鴈空燈火市樓知酒賤歌呼村路覺年豐誰知病守無歡意也與邦人一笑同新年寄迹人間夢已長新年脱㡌始㣲霜坐中使氣如秦俠陌上行歌類楚狂下榻欲招賢與語杜門聊以醉為鄉嵇山剡曲雖歡樂終憶祁連古戰場遊鄞晚雨初收旋作晴買舟訪舊海邊城髙㠶斜掛夕陽色急艣不聞人語聲掠水翻翻沙鷺過供㕑片片雪鱗明山川不與人俱老更㡬東來了此生休日行郡圃南山如黛照朱扉地接官居到亦稀寒蝶徘徊掠衰草孤花閒淡㺯斜暉荒城歌舞難娱客休日文書且觧圍猶勝去年窮巷底卧聞砧杵念秋衣夜步市人莫笑雪䝉頭南陌東阡信脚遊風遞鐘聲雲外寺水揺燈影酒家樓鶴歸遼海逾千嵗楓落吴江又一秋却掩船扉耿無寐半牕落月照清愁登北榭遶城山作翠濤傾底事文書日有程無溷我為揮吏散獨登樓去看雲生香浮鼻孔煎茶熟喜動眉間錬句成莫笑衰翁淡生活他年猶得配𤣥英七言四句平陽驛舍梅花江路輕隂未成雨梅花欲過半沾泥逺來不負東皇意一絶清詩手自題看山小葺茅茨紫翠間今年偷得半年閒門前木落須霜曉且㸔西南一角山戲題走馬平欺刺繡坡放船横截亂絲渦從來倚箇心平穏遇險方知得力多青村寺十年淹泊望修門臨水登山㡬斷魂短􅁂星星身欲老小樓明月宿青村題畫燕一雙掠水燕來初萬㸃飛花社雨餘辛苦成巢君勿笑從來吾亦愛吾廬叙州三絶畫船衝雨入戎州縹緲山横杜若洲休信時平邉堠静傳烽夜夜到西樓文章何罪觸雷霆風雨南溪自醉醒八十年間遺老盡壊堂無壁草青青楚柂吴檣又逺遊浣花行樂夢西州千尋鐡鎻還堪恨空鎻長江不鎻愁龍興寺弔少陵先生寓居中原草草失承平戍火邊塵到兩京扈蹕老臣身萬里天寒來此聴江聲過靈石三峯二首竒峰迎馬駭衰翁蜀嶺吴山一洗空抜地青蒼五千仞勞渠蟠屈小詩中曉日曈曨雪未殘三峰傑立挿雲間老夫合是征西將胷次先収一華山歸州重五屈平祠在州東南五里歸鄉盖平所居闘舸紅旗滿急湍船牕睡起亦閒㸔屈平鄉國逢重五不比常年角黍盤屈平廟委命仇讎事可知章華荆棘國人悲恨公無夀如金石不見秦嬰繫頸時楚城江上荒城猿鳥悲隔江便是屈原祠一千五百年間事只有灘聲似舊時别建安三十年來雲水僧常挑鉢袋繫行幐信縁不作癡窠窟即是吾家無盡燈放翁詩選前集巻八
