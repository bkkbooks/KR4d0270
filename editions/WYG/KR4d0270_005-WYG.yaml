body:
  text: 放翁詩選前集巻五宋羅椅編七言八句雨中示子聿窮閻父子自相依寂寂茅廬映竹扉𤓰蔓水生初抺岸練花寒動却添衣吾𤣥自笑豈尚白汝瘦元知能勝肥苦學勿為干禄計宦途雖樂不如歸遊山西村莫笑農家臘酒渾豐年留客足雞豚山重水複疑無路栁暗花明又一村簫鼔追隨春社近衣冠簡朴古風存從今若許閒乗月拄杖無時夜叩門秋雨初霽戯筆墨入紅絲㸃漆濃閒將倦筆冩秋容雨聲已斷時聞滴雲氣將歸别起峰斜日半穿臨水竹好風遥送隔城鐘逺遊更動輕舟興太息何人解見從作夢作夢今逾七十年平生懐抱尚依然結茅杜曲桑麻地覔句㶚橋風雪天驃騎向來求作佛淮南末路望登仙世間妄想何窮盡輸與山翁一醉眠龜堂獨坐遣悶髪已凋踈齒已揺高談誰與慰無聊苦心雖嘔何由出病骨非䜛亦自銷玉雪㣲塵烹瑞草胭脂小把斸靈苖賀公吳語吾能似太息遺魂不可招春行九日春隂一日晴强扶衰病此閒行猩紅帶露海棠濕鴨綠平堤湖水明杜子美曉看紅濕處李太白蜀江紅且明濕明字可謂奪造化之功世未有拈出者酒賤栁隂逢醉卧牛肥稻壟看深耕山翁莫道渾無用解與明時説太平七十三吟七十三年事事新􅇽濡幸作六朝民髪無可白方為老酒不能賖始覺貧末路已悲身是客此心猶與物為春柴門勿謂當岑寂時有郷隣請藥人睡起至園中春風忽已遍天涯老子猶能領物華淺碧細傾家釀酒小紅初試手栽花野人易與輸肝肺俗話誰能掛齒牙更欲世間同省事勾回蟻戰放蜂衙蹭蹬少慕功名頗自竒一生蹭蹬鬢成絲市楼酒美貧何預斗柄春回老不知黒幟遊魂應有数白衣效命永無期魚梁東畔牛䦨北舉世誰能識此悲初春欲散步畏寒而歸峭寒漠漠出重貂酒力欺人凝不消春困苦多無處賣客魂欲斷倩誰招一溪水淺梅枝瘦四野雲酣雪意驕欲到前村無奈嬾却尋歸路度西橋遣興二首幾看人間嵗月新釣船猶繋鏡湖濵曽穿高帝朝元仗却作山隂版籍民留病三分嫌太健忍飢半日未全貧早知晝繡能為祟翁子終身合負薪湖海元為汗漫遊誤恩四領幔亭秋掃空薄禄始無愧閉上衡門那得愁湯嫩雪濤翻茗椀火温香􅈁上衣篝床頭亦有閒書巻信手拈來倦即休醉題埭西酒家二首陣陣新寒入布裘偶乗小醉得閒遊丹楓落日野橋晚斷鴈濕雲江路秋馬得一鳴何恨斥金經百煉豈容柔不知千載塵埃裏更有吾曹強項不桑麻䝉翳不通鄰耽酒頽然一老民遣客方眠那是醉有衣可典未為貧曬翎斜日鷗來熟印迹平沙鴈到新君看此閒何境界癡人猶説吐車茵遊近山羸病知難賦逺遊尚尋好景送悠悠亂山孤店鴈聲晚一馬二童溪路秋掃壁有僧求醉墨倚楼無客話清愁殘年敢望常強健到處臨歸為小留書感壯嵗功名妄自期晚途流落鬢成絲臨風畫角曉三弄釀雪野雲寒四垂金鏁甲思酣戰地皂貂裘記逺遊時此心炯炯空添淚青史他年未必知数日不出門偶賦湖上蝸廬僅自容寸懐無奈百憂攻補衣未竟迫秋露待飯不來聞午鍾稚子挾書勤質問鄰翁釋耒間過従今朝一笑君知否滿甕新醅粥面濃初冬平生詩句領流光絶愛初冬萬瓦霜楓葉欲殘看愈好梅花未動意先香暮年自適何妨退短景無營亦自長况有小兒同此趣一牎相對弄朱黄昨非温飽従來與道違書生只合卧牛衣老狐五百年前錯孤鶴三千嵗後歸舌自生肥勝玉食腰常忘帶况金圍一官彭澤従何有元亮還家悔昨非史院晩出已乞殘骸老故丘誤恩重作道山遊龍津雨過橋如拭鳳闕煙消瓦欲流直舍小眠鐘報午歸途㣲冷葉飛秋心知伏櫪無千里縦有王良也合休飽食飽食無功媿汗青燈前顧影歎伶俜馬衰猶養疑知路龜乆當捐為不靈腰下徒誇綬若若鏡中何止髪星星石帆回首初非逺要及清秋斸茯苓初春書懐耄大光隂古更稀自今惟有数期頤食觀本草雖多事醉讀離騷自一竒物外有人閒始見山中可樂老方知武陵好在桃千樹短櫂相尋亦未遲乆雨梅天一日幾隂晴對酒無聊醉不成巧厯莫能知雨㸃孤桐那解寫溪聲林深鳥雀來無数草茂鉏耰去即生明日雲開天萬里御風吾欲過青城明日復理夢中意作白盡髭鬚兩頰紅頺然自以放名翁客従謝事歸時散詩到無人愛處工高掛蒲帆上黄鶴獨吹鐡笛過垂虹閒人浪迹由來事那計猿驚蕙帳空夏夜展轉紗厨睡不成一藤扶憊遶廊行月升雙鵲移枝宿露下孤螢綴蔓明汲井忽驚人已起開門堪歎事還生羽衣道㡌從吾好栢子煙中起磬聲老甚自詠二首殘年真欲数期頤一事無營飽即嬉身入童兒鬭草社心如太古結繩時騰騰不許諸人㑹兀兀従教老子癡亦莫城中買鹽酪菜羮有味淡方知羨生常笑古人癡俛仰那知迫耄期鏡裏􅁂無添白處樽前顔有暫丹時客嗔終嵗常稱疾兒訝經旬嬾賦詩枉却愁過强健日身閒何往不熙熙放翁詩選前集巻五
