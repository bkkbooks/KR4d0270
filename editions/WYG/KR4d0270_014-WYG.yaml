body:
  text: 放翁詩選後集巻四宋羅椅撰古詩西郊尋梅西郊梅花矜絶艷走馬獨來看不厭似羞流俗䝉市塵寧墮荒寒傍茆店翛然自是世外人過去生中羞一念淺顰常鄙桃李學獨立不容鶯蝶覘山礬水仙晚角出大似春秋吳越僣餘花豈無好顔色病在一俗無由砭朱䦨玉砌渠有命斷橋流水君何欠十四宇弔慰兩盡嗟予相與頗同調身客劔南家在剡凄凉萬里歸無日蕭颯二毛衰有漸尚能作意晚相從爛漫不辭盃㶑灧綿州録叅軍㕔觀楚公畫鷹少陵為作詩者我來訪古涪之濵不辭百妄冀一真磊落顛倒走馬朝尋海㯶館斫鱠夜醉魴魚津越王樓髙亦已換俯仰今古堪悲辛督郵官舎最卑陋棟撓楹腐知幾春巋然此壁獨無恙老槎勁翮完如新向來刼火何日免叱呵守䕶疑有神妖狐九尾穴中嘯共置不問如越秦大時此物合致用下韝指呼端在人會當原野灑毛血坐令萬里清烟塵老眼還憂不及見詩成肝膽空輪囷正是作者山南行我行山南已三日如繩大路東西出平川沃野望不盡麥隴青青桑欝欎地近函秦氣俗豪秋千蹴踘分朋曹苜蓿連雲馬蹄疾楊柳夾道車聲髙古來厯厯興亡處舉目山河尚如故将軍壇上冷雲低丞相祠前春日暮國家四紀失中原師出江淮未易吞會看金皷従天下却用闗中作本根起結次第皆稱龍掛成都六月天大風發屋動地聲勢雄黑雲崔嵬行風中凛如鬼神塞虚空霹靂迸火射地紅上帝有命起伏龍龍尾不巻曳天東壮哉雨㸃車軸同山摧水溢路不通連根拔出千丈松未言為人作年豐偉觀一洗芥蔕胷羅翅峽江小酌爐烟淡将散江雨吹欲無回風吹衣襟晴光滿菰蒲隠几樂此時清和如夏初犬吠船丁歸小市得美蔬歡言酌清醥侑以案上書雖云泊江渚何異歸林廬雙清堂夜賦陸子病少間獨卧溪上堂人静魚自躍風定荷更香素月行中天流螢失孤光歸鳥飛有聲度此十里塘嗟我獨何事遲暮客異鄉太息搔短髪起視夜未央風月老來苦無伴風月獨見知未嘗費招呼到處相娱嬉披襟萬里快弄影三更竒淋漓蜀苑酒散落江樓詩狂歌撼山川醉墨飛蛟螭聊将調俗子更遣半生癡游東都趙氏園清晨呼馬出馭吏請所之錦城浩如海我亦無與期有花即入門莫問主人誰下馬據胡床傲睨忘訶譏人言白頭翁胡為尚兒癡老翁故不癡借花發吾詩詩句帶花香東風不敢吹徘徊雙蝴蝶許可鼻端知能言能賦無復此老對酒閒愁如飛雪入酒即消融好花如故人一笑盃自空流鶯有情亦念我柳邊盡日啼東風長安不到十四載酒徒往往成衰翁九環寳帶光照地不如留君雙頰紅郊飲村酒大醉丈夫無苟求君子有素守不能垂竹帛正可死隴畆邯鄲枕中夢要是夢所有持枕與農夫亦作此夢否今朝郊外逰取醉村市酒未敢羞空囊爛漫詩千首寒夜遣懷臨觴本不飲憂多自成醉四方行萬里不見埋愁地憶昔入京都寳馬揺香鬃酣飲清樓夜歌聲在半空去日不可挽華髪忽垂領娟娟蛾眉月相對作凄冷月落照空床不寐聴寒螀早知憂隨人何用去故鄉長門怨寒風凄有聲寒日慘無輝空房不敢恨但懷歳暮悲今年選後宫連娟千蛾睂早知獲譴速悔不承恩遲聲當徹九天淚當達九泉死猶復見思生當長棄捐盡用陳語而各有態月夕我昔隠天台夜半游勾曲弄月過垂虹萬頃一片玉烟艇起菱唱松風吹釣絲更欲小徙倚恐失初平期今年游青城三十六峯巒白雲反在下使我毛骨寒天如玻璃盆倒懸濕銀海素璧行其間草木盡光彩姮娥顧我笑手撫玉兎兒莫怪世人生白髪秋風桂老欲無枝次韻何元立贈行嘉榮東西州此别不為逺徘徊凌雲寺决去未遽忍登髙望故人烟樹參差見懸知今夕夢不隔空城鍵平生相從意百年有未滿結巢青城雲期子在歳晚醉中懐眉山舊游勁酒少和氣哀歌無歡情故鄉不敢思登髙望錦城錦城那得去彷彿蟇頥路遥知樽前人指我題詩處我雖流落夜郎天遇酒能狂似少年想見東郊携手日海棠如雪栁如綿南軒今年秋早凉七月已蕭然南軒修竹下枕簞終日眠時将半殘夢聴此欲斷蟬推枕起太息四序忽已遷功名墮渺莽衰疾方連綿新月獨多情窺牕淡娟娟舟中聞姑惡女生藏深閨未省窺墻藩上車移所天父母為他門妾身雖甚愚亦知君姑尊下床頭雞鳴梳髻著襦裙堂上奉灑掃厨中饋盤飱青青摘葵莧恨不美熊蹯姑色少不怡衣袂濕淚痕所冀妾生男庶幾姑弄孫此意竟蹉跎薄命來䜛言放棄不敢怨所悲孤大恩古路傍陂澤微雨鬼火昏君聴姑惡聲無乃遣婦魂歳暮離離井上桐欝欝墻下桑零落豈不悲無柰中夜霜蟋蟀更可念歳暮依客床客亦自孤寂衣篝歇殘香一燈掛西壁耿耿青無光援筆欲寫愁三喟不成章五鼓自簇橋入府曉月有餘光秋樹無濃影野烟浩無際陂路行逾永堰聲何澎湃露氣正淒冷忽然客愁破更覺詩律整昔人千載意忙裏一笑領山林豈難歸吾計自不猛古意紲足飼饑鷹鷹飽意未平伏􅌴豈不安老驥終悲鳴士生固欲達又懼徒富貴素願有未伸五鼎淡無味茆屋秋雨漏稻陂春水深長歌傾濁酒舉世不知心放翁詩選後集巻四
