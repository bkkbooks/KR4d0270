body:
  text: 放翁詩選後集卷四宋羅椅撰古詩西郊尋梅西郊梅花矜絶艷走馬獨來看不厭似羞流俗蒙市塵寧墮荒寒傍茆店翛然自是世外人過去生中羞一念淺顰常鄙桃李學獨立不容鶯蝶覘山礬水仙晚角出大似春秋吳越僣餘花豈無好顔色病在一俗無由砭朱闌玉砌渠有命斷橋流水君何欠十四宇弔慰兩盡嗟豫相與頗同調身客劔南家在剡凄涼萬里歸無日蕭颯二毛衰有漸尚能作意晚相從爛漫不辭杯瀲灧綿州録參軍廳觀楚公畫鷹少陵為作詩者我來訪古涪之濵不辭百妄冀一真磊落顛倒走馬朝尋海棕館斫鱠夜醉魴魚津越王樓髙亦已換俯仰今古堪悲辛督郵官舍最卑陋棟撓楹腐知幾春巋然此壁獨無恙老槎徑翮完如新向來劫火何日免叱呵守護疑有神妖狐九尾穴中嘯共置不問如越秦大時此物合致用下韝指呼端在人會當原野灑毛血坐令萬里清煙塵老眼還憂不及見詩成肝膽空輪囷正是作者山南行我行山南已三日如繩大路東西出平川沃野望不盡麥隴青青桑鬱欎地近函秦氣俗豪秋千蹴踘分朋曹苜蓿連雲馬蹄疾楊柳夾道車聲髙古來厯厯興亡處舉目山河尚如故將軍壇上冷雲低丞相祠前春日暮國家四紀失中原師出江淮未易吞會看金鼓從天下却用關中作本根起結次第皆稱龍挂成都六月天大風發屋動地聲勢雄黑雲崔嵬行風中凛如鬼神塞虛空霹靂迸火射地紅上帝有命起伏龍龍尾不卷曳天東壯哉雨點車軸同山摧水溢路不通連根拔出千丈松未言為人作年豐偉觀一洗芥蒂胸羅翅峽江小酌爐煙淡將散江雨吹欲無回風吹衣襟晴光滿菰蒲隱几樂此時清和如夏初犬吠船丁歸小市得美蔬歡言酌清醥侑以案上書雖云泊江渚何異歸林廬雙清堂夜賦陸子病少間獨卧溪上堂人靜魚自躍風定荷更香素月行中天流螢失孤光歸鳥飛有聲度此十里塘嗟我獨何事遲暮客異鄉太息搔短髮起視夜未央風月老來苦無伴風月獨見知未嘗費招呼到處相娛嬉披襟萬里快弄影三更竒淋漓蜀苑酒散落江樓詩狂歌撼山川醉墨飛蛟螭聊將調俗子更遣半生癡遊東都趙氏園清晨呼馬出馭吏請所之錦城浩如海我亦無與期有花即入門莫問主人誰下馬據胡床傲睨忘訶譏人言白頭翁胡為尚兒癡老翁故不癡借花發吾詩詩句帶花香東風不敢吹徘徊雙蝴蝶許可鼻端知能言能賦無復此老對酒間愁如飛雪入酒即消融好花如故人一笑杯自空流鶯有情亦念我柳邊盡日啼東風長安不到十四載酒徒往往成衰翁九環寶帶光照地不如留君雙頰紅郊飲村酒大醉丈夫無苟求君子有素守不能垂竹帛正可死隴畝邯鄲枕中夢要是夢所有持枕與農夫亦作此夢否今朝郊外逰取醉村市酒未敢羞空囊爛漫詩千首寒夜遣懷臨觴本不飲憂多自成醉四方行萬里不見埋愁地憶昔入京都寶馬搖香鬃酣飲清樓夜歌聲在半空去日不可挽華髮忽垂領娟娟蛾眉月相對作凄冷月落照空床不寐聽寒螀早知憂隨人何用去故鄉長門怨寒風凄有聲寒日慘無輝空房不敢恨但懷歲暮悲今年選後宫連娟千蛾睂早知獲譴速悔不承恩遲聲當徹九天淚當達九泉死猶復見思生當長棄捐盡用陳語而各有態月夕我昔隱天台夜半遊勾曲弄月過垂虹萬頃一片玉煙艇起菱唱松風吹釣絲更欲小徙倚恐失初平期今年遊青城三十六峯巒白雲反在下使我毛骨寒天如玻璃盆倒懸濕銀海素璧行其間草木盡光彩姮娥顧我笑手撫玉兔兒莫怪世人生白髮秋風桂老欲無枝次韻何元立贈行嘉榮東西州此别不為逺徘徊凌雲寺決去未遽忍登髙望故人煙樹參差見懸知今夕夢不隔空城鍵平生相從意百年有未滿結巢青城雲期子在歲晚醉中懷眉山舊遊徑酒少和氣哀歌無歡情故鄉不敢思登髙望錦城錦城那得去倣佛蟇頥路遙知樽前人指我題詩處我雖流落夜郎天遇酒能狂似少年想見東郊携手日海棠如雪栁如綿南軒今年秋早涼七月已蕭然南軒修竹下枕簞終日眠時將半殘夢聽此欲斷蟬推枕起太息四序忽已遷功名墮渺莽衰疾方連綿新月獨多情窺窗淡娟娟舟中聞姑惡女生藏深閨未省窺墻藩上車移所天父母為他門妾身雖甚愚亦知君姑尊下床頭雞鳴梳髻著襦裙堂上奉灑掃厨中饋盤飱青青摘葵莧恨不美熊蹯姑色少不怡衣袂濕淚痕所冀妾生男庶幾姑弄孫此意竟蹉跎薄命來讒言放棄不敢怨所悲孤大恩古路傍陂澤微雨鬼火昏君聽姑惡聲無乃遣婦魂歲暮離離井上桐鬱鬱墻下桑零落豈不悲無奈中夜霜蟋蟀更可念歲暮依客床客亦自孤寂衣篝歇殘香一燈挂西壁耿耿青無光援筆欲寫愁三喟不成章五鼓自簇橋入府曉月有餘光秋樹無濃影野煙浩無際陂路行逾永堰聲何澎湃露氣正淒冷忽然客愁破更覺詩律整昔人千載意忙裏一笑領山林豈難歸吾計自不猛古意紲足飼飢鷹鷹飽意未平伏櫪豈不安老驥終悲鳴士生固欲達又懼徒富貴素願有未伸五鼎淡無味茆屋秋雨漏稻陂春水深長歌傾濁酒舉世不知心放翁詩選後集卷四
