body:
  text: 放翁詩選後集卷五宋羅椅撰古詩衡門感舊蒼烟屯不散匹素橫郊原雨細不成水著水始見痕躊躇意自佳未遽掩衡門一一送歸鴉楓林猶未昏念昔壽州歸紹興初紀元闔門過百口一身今獨存不死實有命送老三家村躬耕幸得食萬事不足論種桑孔明百畝桑景略十具牛豈無子孫念飽暖自可休種桑吾廬西微徑出南陌三月葉暗園四月椹可摘戴勝枝上鳴倉庚葉間飛飛鳴各自得人生胡不歸歸家力農桑慎莫怨貧賤婚嫁就比鄰死生長相見離家示妻子明日當北征竟夕起復眠悲蟲號我傍青燈照我前婦憂衣裳薄紉線重敷綿兒為檢藥籠桂薑手炮煎墩堠默可數一念已酸然使憂能傷人我得復長年同生天壤間人誰無一廛傷哉獨何辜皇皇長可憐破屋不得住風雨走道邉呼天得聞否賦與何其偏夏夜落月不滿窗驚鵠屢移樹沉憂少睡眠亦以衰疾故五更忽作夢立馬青衣渡白首厭山村郵亭憶征步月夕開户滿庭雪徐看知月明微風入叢竹復作雪來聲俗塵不待掃凛然肺肝清林深無漏鼓鶴唳報三更夜聞櫓聲咿啞雙櫓聲淒切遊子情豈無一杯酒孤舟誰與傾清愁不可耐霜月照潮平對酒新酥鵝兒黃珍橘金彈香天公憐寂寞勞我以一觴胸中萬卷書老不施豪芒持酒一澆之與汝俱深藏生當老窮巷死埋南山岡古來共如此已矣庸何傷夜讀兵書孤燈耿霜夕窮山讀兵書平生萬里心執戈王前驅戰士死所有耻復守妻孥成功亦邂逅逆料政自疏名言確論陂澤號饑鴻歲月多貧儒歎息鏡中面安得長膚腴朱子雲園中觀花我鬢忽已白君顔非復朱花前一杯酒不樂復何如暮看枝上花已覺不如早富貴當及時吾輩奈何老我欲君起舞竟日為君留安知花無情不解替人愁長安二三月花滿上林中祝君早得意歸轡聽玲瓏酒無獨飲理酒無獨飲理常恨缺徒客忽得我輩人豈計晨與夕少年事虛名歲月駒過隙自從老大來一日亦可惜糟丘未易辦小計且千石頽然置萬事天地為幕席人生如刀礪磨盡要有日不須荷鍤隨况問幾兩屐青山白雲歌青山白雲翁放浪酒中死埋骨長松根夜夜聽溪水松老會作薪骨朽會作塵但留千載狂名在知我他年自有人聞婆餅焦黃泥嶺松森森幽鳥穿枝時一吟汝聲一何悲汝語惻我心連村麥熟餅餌香我母九泉那得嘗七言八句初發夷陵雷動江邊鼓吹雄百灘過盡失途窮山平水逺蒼茫外地闊天開指顧中俊鶻橫飛遙掠岸大魚騰出欲凌空今朝喜氣君知否三丈黃旗舞便風是出峽氣象春殘石鏡山前送落暉春殘回首倍依依時平壯士無功老鄉逺征人有夢歸苜蓿苖侵官道合蕪菁花入麥畦稀倦游自笑摧頽甚誰記飛鷹醉打圍登于城新樓遍至西園池亭狂夫無計奈狂何何況登臨逸興多千疊雪山連滴慱一更春水入摩訶語壓西州吟餘騎省霜侵鬢釣罷𤣥冥雨滿蓑逐虜榆關期尚逺不妨隨處得婆娑感秋西風急杵搗征衣客子關情正此時萬事從今聊復爾百年强半欲何之畫堂蟋蟀怨清夜金井梧桐辭故枝一枕凄凉眠不得呼燈起作感秋詩中四句最愁極早起至江原喔喔鳴雞促曉程翻翻飛鷺導孤征節旄盡落歸猶逺帶眼頻移瘦自驚小市蕭條黃葉滿斷橋零落緑苔生居人猶復多愁思何况天涯倦客情絶勝亭蜀漢羇蹤歲月侵京華乖隔少來音登臨忽據三江會飛動從來萬里心自在冠絶地勝頓驚詩律壯氣增不怕酒杯深一琴一劔白雲外揮手家山何處尋謁凌雲大像出郭幽尋一笑新徑呼艇子載烟津不辝疾步登髙閣却欲今生識偉人不可第二泉鏡正涵螺髻緑浪花不犯寶趺塵始知神力無窮盡丈六黃金果小身得梅一枝戲成髙標已壓萬花羣尚恐嬌春氣習存月兔搗霜供換骨湘娥鼓瑟為招魂孤城小驛初飛雪斷角殘鐘半掩門自然是梅詩盡意端相終有恨夜寒皴玉倩誰溫宿杜氏莊晨起遇雨怪藤十圍蔽白日老木千尺干青霄水泛戞灘竹作舫陸行跨空繩繫橋陰陰古木精靈語慘慘江雲蛟鰐驕前四句須是此兩句方險吾道非邪行至此諸公正散紫宸朝西樓夕望夜郎城裏歎途窮賴有西樓著此翁溪鳥孤飛寒靄外野人參語夕陽中蒼天可恃何曾老白髮緣愁却未公俗態千年看爛熟不如留眼送飛鴻上元細細香塵暗六街魚鱗淺碧暮雲開新粧褰幕全身見誤馬隨車一笑回酒釅頓忘風力峭夜長猶恨漏聲催京華舊侶雕零盡短鬢成絲心未灰吳體寄張季良九月十月天雨霜江南劔南途路長平生故人阻携手萬里一書空斷腸人生强健已難恃世事變遷那可常兩家子孫各長大他年窮達毋相忘醉中登避俗臺半醉行歌上古臺脫巾散髮謝氛埃但知禮豈為我設莫問客從何處來剡曲烟波菱蔓滑耶溪風露藕花開老來世事渾成懶一棹幽尋未擬回自述勃落為衣隱薜蘿掃空塵抱養天和過期未死更强健與世不諧猶嘯歌野市蕭條殘葉滿酒家零落廢壚多石帆山下孤舟雨借問君如此老何雨夜斷岸輕烟著柳條孤村小雨夜蕭蕭荒雞隔浦聲相續短燭無風焰自搖朴學無如糜歲月殘生竟是老漁樵最憐鬢畔千莖雪日日春風吹不消秋雨一秋風雨蔽白日積水鬼神愁太陰寒螿悲鳴草根濕水鳥暝呌菰叢深殘年不覺日月逝病骨惟愁霜露侵常有淖糜供旦暮一毫寧復少年心舟中曉賦木落霜清水鳥呼扁舟夜泊古城隅吹殘畫角鐘初動低盡寒空斗欲無浪迹已同鷗境界逺遊方羡鴈程途髙檣健席從今始遍厯三江與五湖寄子虛子遵大兒再渡吳門秋小兒錢塘踰月留恨身不能插兩翅與汝相守寬百憂聞鐘時宿霜雲外待月亦上湖邉樓但常保此豈不樂路難悠悠非善謀放翁詩選後集卷五
